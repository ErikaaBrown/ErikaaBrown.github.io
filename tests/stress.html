    </div>
  </section>
</main>

<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var ITEMS = [
    { r: false, pt: "...senti-me nervoso ou em stress.", en: "...I felt nervous or stressed." },
    { r: false, pt: "...senti que não conseguia controlar as coisas importantes da minha vida.", en: "...I felt unable to control the important things in my life." },
    { r: true,  pt: "...senti confiança na minha capacidade de resolver problemas pessoais.", en: "...I felt confident in my ability to handle personal problems." },
    { r: true,  pt: "...senti que as coisas estavam a correr como eu queria.", en: "...I felt that things were going my way." },
    { r: false, pt: "...senti que as dificuldades se acumulavam tanto que não as conseguia ultrapassar.", en: "...I felt difficulties piling up so high I could not overcome them." },
    { r: false, pt: "...irritei-me com coisas fora do meu controlo.", en: "...I got upset over things outside my control." },
    { r: true,  pt: "...consegui gerir bem o meu tempo e as minhas prioridades.", en: "...I managed my time and priorities well." },
    { r: false, pt: "...dormi mal por causa de preocupações.", en: "...I slept badly because of worries." },
    { r: true,  pt: "...consegui relaxar no meu tempo livre.", en: "...I was able to relax in my free time." },
    { r: false, pt: "...senti-me sobrecarregado com tudo o que tinha para fazer.", en: "...I felt overloaded by everything I had to do." }
  ];

  var FREQ = {
    pt: ["Nunca", "Quase nunca", "Às vezes", "Frequentemente", "Muito frequentemente"],
    en: ["Never", "Almost never", "Sometimes", "Often", "Very often"]
  };

  var BANDS = [
    { max: 13, key: "low",   color: "var(--good)",     icon: "✅" },
    { max: 19, key: "mod",   color: "var(--warn)",     icon: "⚠️" },
    { max: 26, key: "high",  color: "var(--serious)",  icon: "🔶" },
    { max: 40, key: "vhigh", color: "var(--critical)", icon: "❗" }
  ];

  var answers = new Array(ITEMS.length).fill(-1);
  var idx = 0;
  var state = "intro";
  var $ = function (id) { return document.getElementById(id); };

  function show(panel) {
    $("panel-intro").classList.toggle("hidden", panel !== "intro");
    $("panel-quiz").classList.toggle("hidden", panel !== "quiz");
    $("panel-result").classList.toggle("hidden", panel !== "result");
    state = panel;
  }

  function renderQuestion() {
    var item = ITEMS[idx];
    $("qtext").textContent = item[PL.lang];
    $("qcount").textContent = (idx + 1) + " / " + ITEMS.length;
    $("pfill").style.width = (idx / ITEMS.length * 100) + "%";
    var lk = $("likert");
    lk.innerHTML = "";
    FREQ[PL.lang].forEach(function (label, i) {
      var b = document.createElement("button");
      b.textContent = label;
      if (answers[idx] === i) b.classList.add("sel");
      b.addEventListener("click", function () {
        answers[idx] = i;
        b.classList.add("sel");
        setTimeout(function () {
          if (idx < ITEMS.length - 1) { idx++; renderQuestion(); }
          else { finish(); }
        }, 220);
      });
      lk.appendChild(b);
    });
    $("btn-back").disabled = idx === 0;
  }

  function score() {
    var s = 0;
    ITEMS.forEach(function (item, i) {
      s += item.r ? 4 - answers[i] : answers[i];
    });
    return s;
  }

  function bandOf(s) {
    for (var i = 0; i < BANDS.length; i++) if (s <= BANDS[i].max) return BANDS[i];
    return BANDS[BANDS.length - 1];
  }

  function gauge(s) {
    var cx = 210, cy = 200, R = 150, W = 26;
    function pol(frac) {
      var a = Math.PI + frac * Math.PI;
      return [cx + R * Math.cos(a), cy + R * Math.sin(a)];
    }
    function arc(f0, f1, color) {
      var p0 = pol(f0), p1 = pol(f1);
      var large = (f1 - f0) > 0.5 ? 1 : 0;
      return "<path d='M" + p0[0] + " " + p0[1] + " A" + R + " " + R + " 0 " + large + " 1 " + p1[0] + " " + p1[1] +
        "' fill='none' style='stroke:" + color + "' stroke-width='" + W + "'/>";
    }
    var gap = 0.008;
    var stops = [0, 13.5 / 40, 19.5 / 40, 26.5 / 40, 1];
    var arcs = "";
    BANDS.forEach(function (b, i) {
      arcs += arc(stops[i] + (i ? gap : 0), stops[i + 1] - (i < 3 ? gap : 0), b.color);
    });
    var f = Math.max(0.01, Math.min(0.99, s / 40));
    var tip = pol(f);
    var innerR = R - W / 2 - 12;
    var a = Math.PI + f * Math.PI;
    var base = [cx + innerR * Math.cos(a), cy + innerR * Math.sin(a)];
    var needle = "<line x1='" + base[0] + "' y1='" + base[1] + "' x2='" + tip[0] + "' y2='" + tip[1] +
      "' style='stroke:var(--ink)' stroke-width='4' stroke-linecap='round'/>";
    return "<svg viewBox='0 0 420 240' role='img' aria-label='Gauge'>" + arcs + needle +
      "<text x='" + cx + "' y='" + (cy - 30) + "' text-anchor='middle' font-size='52' font-weight='800' style='fill:var(--ink)'>" + s + "</text>" +
      "<text x='" + cx + "' y='" + (cy - 4) + "' text-anchor='middle' font-size='14' style='fill:var(--ink-3)'>/ 40</text>" +
      "<text x='" + (cx - R) + "' y='" + (cy + 26) + "' text-anchor='middle' font-size='12' style='fill:var(--ink-3)'>0</text>" +
      "<text x='" + (cx + R) + "' y='" + (cy + 26) + "' text-anchor='middle' font-size='12' style='fill:var(--ink-3)'>40</text>" +
      "</svg>";
  }

  function renderResult() {
    var s = score();
    var b = bandOf(s);
    $("gauge-wrap").innerHTML = gauge(s);
    $("badge-line").innerHTML = "<span class='status-badge'>" + b.icon + " <span style='color:" + b.color + "'>" + PL.t("lbl." + b.key) + "</span></span>";
    $("band-text").textContent = PL.t("band." + b.key);
    var sugs = ["sug.1", "sug.2", "sug.3", "sug.4", "sug.5"];
    var html = "<h3 style='margin-top:0'>" + PL.t("sug.title") + "</h3><ul style='padding-left:0;list-style:none;margin:0'>";
    sugs.forEach(function (k) { html += "<li style='margin:10px 0'>" + PL.t(k) + "</li>"; });
    if (b.key === "high" || b.key === "vhigh") html += "<li style='margin:14px 0;font-weight:700'>" + PL.t("sug.pro") + "</li>";
    html += "</ul>";
    $("suggestions").innerHTML = html;
  }

  function finish() {
    $("pfill").style.width = "100%";
    PL.saveTestResult("stress", score());
    renderResult();
    show("result");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  $("btn-start").addEventListener("click", function () {
    answers.fill(-1); idx = 0; show("quiz"); renderQuestion();
  });
  $("btn-back").addEventListener("click", function () {
    if (idx > 0) { idx--; renderQuestion(); }
  });
  $("btn-retake").addEventListener("click", function () {
    answers.fill(-1); idx = 0; show("quiz"); renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  PL.onLang(function () {
    if (state === "quiz") renderQuestion();
    if (state === "result") renderResult();
  });
})();
</script>
</body>
</html>
