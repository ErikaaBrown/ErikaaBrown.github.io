<div id="site-footer"></div>

    },
    en: {
      "page.title": "Self-Esteem",
      "crumb": "Tests",
      "intro.lead": "Self-esteem is the overall evaluation you make of yourself — how much you consider yourself a person of worth.",
      "intro.p1": "You will answer 10 statements about how you see yourself. There are no right or wrong answers: indicate how much you agree with each one.",

<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var ITEMS = [
    { r: false, pt: "Sinto que sou uma pessoa de valor, no mínimo tanto quanto os outros.", en: "I feel that I am a person of worth, at least on an equal plane with others." },
    { r: false, pt: "Sinto que tenho um bom número de qualidades.", en: "I feel that I have a number of good qualities." },
    { r: true,  pt: "Tudo somado, tenho tendência para sentir que sou um fracasso.", en: "All in all, I am inclined to feel that I am a failure." },
    { r: false, pt: "Sou capaz de fazer as coisas tão bem como a maioria das pessoas.", en: "I am able to do things as well as most other people." },
    { r: true,  pt: "Sinto que não tenho muito de que me orgulhar.", en: "I feel I do not have much to be proud of." },
    { r: false, pt: "Tenho uma atitude positiva em relação a mim mesmo/a.", en: "I take a positive attitude toward myself." },
    { r: false, pt: "No geral, estou satisfeito/a comigo mesmo/a.", en: "On the whole, I am satisfied with myself." },
    { r: true,  pt: "Gostava de ter mais respeito por mim mesmo/a.", en: "I wish I could have more respect for myself." },
    { r: true,  pt: "Por vezes sinto-me mesmo inútil.", en: "I certainly feel useless at times." },
    { r: true,  pt: "Às vezes penso que não presto para nada.", en: "At times I think I am no good at all." }
  ];

  var LIKERT = {
    pt: ["Discordo totalmente", "Discordo", "Concordo", "Concordo totalmente"],
    en: ["Strongly disagree", "Disagree", "Agree", "Strongly agree"]
  };

  var BANDS = [
    { max: 14, key: "low",  color: "var(--serious)",  icon: "🌱" },
    { max: 25, key: "mid",  color: "var(--brand)",    icon: "🪞" },
    { max: 30, key: "high", color: "var(--good)",     icon: "✨" }
  ];

  var answers = new Array(ITEMS.length).fill(-1);
  var idx = 0;
  var state = "intro";
  var $ = function (id) { return document.getElementById(id); };

  function show(panel) {
    $("panel-intro").classList.toggle("hidden", panel !== "intro");
    $("panel-quiz").classList.toggle("hidden", panel !== "quiz");
    $("panel-result").classList.toggle("hidden", panel !== "result");
    state = panel;
  }

  function renderQuestion() {
    var item = ITEMS[idx];
    $("qtext").textContent = item[PL.lang];
    $("qcount").textContent = (idx + 1) + " / " + ITEMS.length;
    $("pfill").style.width = (idx / ITEMS.length * 100) + "%";
    var lk = $("likert");
    lk.innerHTML = "";
    LIKERT[PL.lang].forEach(function (label, i) {
      var b = document.createElement("button");
      b.textContent = label;
      if (answers[idx] === i) b.classList.add("sel");
      b.addEventListener("click", function () {
        answers[idx] = i;
        b.classList.add("sel");
        setTimeout(function () {
          if (idx < ITEMS.length - 1) { idx++; renderQuestion(); }
          else { finish(); }
        }, 220);
      });
      lk.appendChild(b);
    });
    $("btn-back").disabled = idx === 0;
  }

  function score() {
    var s = 0;
    ITEMS.forEach(function (item, i) {
      s += item.r ? 3 - answers[i] : answers[i];
    });
    return s;
  }

  function bandOf(s) {
    for (var i = 0; i < BANDS.length; i++) if (s <= BANDS[i].max) return BANDS[i];
    return BANDS[BANDS.length - 1];
  }

  function gauge(s) {
    var cx = 210, cy = 200, R = 150, W = 26;
    function pol(frac) {
      var a = Math.PI + frac * Math.PI;
      return [cx + R * Math.cos(a), cy + R * Math.sin(a)];
    }
    function arc(f0, f1, color) {
      var p0 = pol(f0), p1 = pol(f1);
      var large = (f1 - f0) > 0.5 ? 1 : 0;
      return "<path d='M" + p0[0] + " " + p0[1] + " A" + R + " " + R + " 0 " + large + " 1 " + p1[0] + " " + p1[1] +
        "' fill='none' style='stroke:" + color + "' stroke-width='" + W + "'/>";
    }
    var gap = 0.008;
    var stops = [0, 14.5 / 30, 25.5 / 30, 1];
    var arcs = "";
    BANDS.forEach(function (b, i) {
      arcs += arc(stops[i] + (i ? gap : 0), stops[i + 1] - (i < BANDS.length - 1 ? gap : 0), b.color);
    });
    var f = Math.max(0.01, Math.min(0.99, s / 30));
    var tip = pol(f);
    var innerR = R - W / 2 - 12;
    var a = Math.PI + f * Math.PI;
    var base = [cx + innerR * Math.cos(a), cy + innerR * Math.sin(a)];
    var needle = "<line x1='" + base[0] + "' y1='" + base[1] + "' x2='" + tip[0] + "' y2='" + tip[1] +
      "' style='stroke:var(--ink)' stroke-width='4' stroke-linecap='round'/>";
    return "<svg viewBox='0 0 420 240' role='img' aria-label='Gauge'>" + arcs + needle +
      "<text x='" + cx + "' y='" + (cy - 30) + "' text-anchor='middle' font-size='52' font-weight='800' style='fill:var(--ink)'>" + s + "</text>" +
      "<text x='" + cx + "' y='" + (cy - 4) + "' text-anchor='middle' font-size='14' style='fill:var(--ink-3)'>/ 30</text>" +
      "<text x='" + (cx - R) + "' y='" + (cy + 26) + "' text-anchor='middle' font-size='12' style='fill:var(--ink-3)'>0</text>" +
      "<text x='" + (cx + R) + "' y='" + (cy + 26) + "' text-anchor='middle' font-size='12' style='fill:var(--ink-3)'>30</text>" +
      "</svg>";
  }

  function renderResult() {
    var s = score();
    var b = bandOf(s);
    $("gauge-wrap").innerHTML = gauge(s);
    $("badge-line").innerHTML = "<span class='status-badge'>" + b.icon + " <span style='color:" + b.color + "'>" + PL.t("lbl." + b.key) + "</span></span>";
    $("band-text").textContent = PL.t("band." + b.key);
  }

  function finish() {
    $("pfill").style.width = "100%";
    PL.saveTestResult("rosenberg", score());
    renderResult();
    show("result");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  $("btn-start").addEventListener("click", function () {
    answers.fill(-1); idx = 0; show("quiz"); renderQuestion();
  });
  $("btn-back").addEventListener("click", function () {
    if (idx > 0) { idx--; renderQuestion(); }
  });
  $("btn-retake").addEventListener("click", function () {
    answers.fill(-1); idx = 0; show("quiz"); renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  PL.onLang(function () {
    if (state === "quiz") renderQuestion();
    if (state === "result") renderResult();
  });
})();
</script>
</body>
</html>
