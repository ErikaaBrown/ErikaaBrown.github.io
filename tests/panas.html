<main class="container narrow">
  <div class="page-hero">

    <h1>🌗 <span data-i18n="page.title"></span></h1>

  <section id="panel-intro" class="panel">

    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>

  <section id="panel-quiz" class="panel hidden">

      <button class="btn btn-ghost btn-sm" id="btn-back" data-i18n="btn.back"></button>
      <span></span>
    </div>
  </section>

  <section id="panel-result" class="hidden">
    <div class="panel">
      <h2 style="margin-top:0" data-i18n="res.title"></h2>
      <div id="bars"></div>
      <p id="combo-text" class="muted" style="margin-top:14px"></p>
    </div>
    <div class="notice" data-i18n-html="res.notice"></div>
    <div class="center mt-2">
      <button class="btn btn-ghost" id="btn-retake" data-i18n="btn.retake"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

    },
    en: {
      "page.title": "PANAS · Positive and Negative Affect",
      "crumb": "Tests",
      "intro.lead": "This questionnaire separates two independent dimensions of your emotional state: how much positive affect and how much negative affect you feel — they are not opposites, you can feel both at once.",
      "intro.p1": "You will see 20 words describing feelings. For each one, indicate how much you have felt it, in general, over the past few weeks.",

<script src="../js/app.js?v=2"></script>
<script>
(function () {
  var ITEMS = [
    { d: 0, pt: "Interessado/a", en: "Interested" },
    { d: 1, pt: "Perturbado/a", en: "Distressed" },
    { d: 0, pt: "Entusiasmado/a", en: "Excited" },
    { d: 1, pt: "Transtornado/a", en: "Upset" },
    { d: 0, pt: "Forte", en: "Strong" },
    { d: 1, pt: "Culpado/a", en: "Guilty" },
    { d: 1, pt: "Assustado/a", en: "Scared" },
    { d: 0, pt: "Hostil", en: "Hostile" },
    { d: 0, pt: "Entusiástico/a", en: "Enthusiastic" },
    { d: 0, pt: "Orgulhoso/a", en: "Proud" },
    { d: 1, pt: "Irritável", en: "Irritable" },
    { d: 0, pt: "Atento/a", en: "Alert" },
    { d: 1, pt: "Envergonhado/a", en: "Ashamed" },
    { d: 0, pt: "Inspirado/a", en: "Inspired" },
    { d: 1, pt: "Nervoso/a", en: "Nervous" },
    { d: 0, pt: "Determinado/a", en: "Determined" },
    { d: 1, pt: "Agitado/a", en: "Jittery" },
    { d: 0, pt: "Concentrado/a", en: "Attentive" },
    { d: 1, pt: "Com medo", en: "Afraid" },
    { d: 0, pt: "Activo/a", en: "Active" }
  ];

  var LIKERT = {
    pt: ["Nada ou muito pouco", "Um pouco", "Moderadamente", "Bastante", "Muitíssimo"],
    en: ["Very slightly or not at all", "A little", "Moderately", "Quite a bit", "Extremely"]
  };

  var answers = new Array(ITEMS.length).fill(0);
  var idx = 0;
  var state = "intro";
  var $ = function (id) { return document.getElementById(id); };

  function show(panel) {
    $("panel-intro").classList.toggle("hidden", panel !== "intro");
    $("panel-quiz").classList.toggle("hidden", panel !== "quiz");
    $("panel-result").classList.toggle("hidden", panel !== "result");
    state = panel;
  }

  function renderQuestion() {
    var item = ITEMS[idx];
    $("qtext").textContent = item[PL.lang];
    $("qcount").textContent = (idx + 1) + " / " + ITEMS.length;
    $("pfill").style.width = (idx / ITEMS.length * 100) + "%";
    var lk = $("likert");
    lk.innerHTML = "";
    LIKERT[PL.lang].forEach(function (label, i) {
      var b = document.createElement("button");
      b.innerHTML = "<span style='display:block;font-size:1.15rem;font-weight:800'>" + (i + 1) + "</span>" + label;
      if (answers[idx] === i + 1) b.classList.add("sel");
      b.addEventListener("click", function () {
        answers[idx] = i + 1;
        b.classList.add("sel");
        setTimeout(function () {
          if (idx < ITEMS.length - 1) { idx++; renderQuestion(); }
          else { finish(); }
        }, 220);
      });
      lk.appendChild(b);
    });
    $("btn-back").disabled = idx === 0;
  }

  function scores() {
    var sums = [0, 0];
    ITEMS.forEach(function (item, i) {
      sums[item.d] += answers[i];
    });
    return sums.map(function (s) { return Math.round((s - 10) / 40 * 100); });
  }

  function renderResult(sc) {
    var pa = sc[0], na = sc[1];
    var bars =
      "<div class='rbar'><div class='rbar-head'><span>🌞 " + PL.t("lbl.pa") + "</span><span class='val'>" + pa + "%</span></div>" +
      "<div class='track'><div class='fill' style='width:" + pa + "%'></div></div></div>" +
      "<div class='rbar'><div class='rbar-head'><span>🌧️ " + PL.t("lbl.na") + "</span><span class='val'>" + na + "%</span></div>" +
      "<div class='track'><div class='fill' style='width:" + na + "%;background:var(--chart-2)'></div></div></div>";
    $("bars").innerHTML = bars;

    var comboKey = (pa >= 50 ? "h" : "l") + (na >= 50 ? "h" : "l");
    $("combo-text").textContent = PL.t("combo." + comboKey);
  }

  function finish() {
    $("pfill").style.width = "100%";
    var sc = scores();
    PL.saveTestResult("panas", sc);
    renderResult(sc);
    show("result");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  $("btn-start").addEventListener("click", function () {
    answers.fill(0); idx = 0; show("quiz"); renderQuestion();
  });
  $("btn-back").addEventListener("click", function () {
    if (idx > 0) { idx--; renderQuestion(); }
  });
  $("btn-retake").addEventListener("click", function () {
    answers.fill(0); idx = 0; show("quiz"); renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  PL.onLang(function () {
    if (state === "quiz") renderQuestion();
    if (state === "result") renderResult(scores());
  });
})();
</script>
</body>
</html>
