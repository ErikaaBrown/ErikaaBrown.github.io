name: Actualizar artigos

on:
  schedule:
    - cron: "17 6 * * *"   # todos os dias às 06:17 UTC
  workflow_dispatch: {}     # permite correr manualmente no separador Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recolher artigos
        run: node scripts/fetch-articles.js

      - name: Commit se houver alterações
        run: |
          git config user.name "psicolab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/articles.json
          if git diff --staged --quiet; then
            echo "Sem alterações."
          else
            git commit -m "Actualizar artigos ($(date -u +%Y-%m-%d))"
            git push
          fi
