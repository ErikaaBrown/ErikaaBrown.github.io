        <span class="chip patient-share-count"></span>
        <span aria-hidden="true" style="color:var(--ink-3);font-size:1.2rem">›</span>

<script src="js/app.js?v=3"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var myCode = "";

  function show(panel) {
    $("panel-notpro").classList.toggle("hidden", panel !== "notpro");
    $("panel-main").classList.toggle("hidden", panel !== "main");
  }

  /* ---------- formatadores por categoria ---------- */

  var SCALAR_TEST_MAX = { stress: 40, rosenberg: 30 };

  function fmtTestResults(arr) {
    if (!Array.isArray(arr) || !arr.length) return "";
    var rows = arr.slice(-10).reverse().map(function (e) {
      var summary = Array.isArray(e.scores)
        ? e.scores.map(function (n) { return Math.round(n); }).join(" / ")
        : (e.scores + (SCALAR_TEST_MAX[e.test] ? "/" + SCALAR_TEST_MAX[e.test] : ""));
      return "<tr><td>" + PL.t("test." + e.test) + "</td><td>" + PL.fmtDate(e.date) + "</td><td>" + summary + "</td></tr>";
    }).join("");
    return "<table class='data'><tbody>" + rows + "</tbody></table>";
  }
  function last30Days() {
    var out = [];
    for (var i = 29; i >= 0; i--) {
      var d = new Date();
      d.setDate(d.getDate() - i);
      out.push(d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"));
    }
    return out;
  }

  function svgTrendChart(days, valueOf, maxVal, targetVal, unitSuffix) {
    var has = days.some(function (iso) { return valueOf(iso) != null; });
    if (!has) return "";
    var W = 640, H = 190, L = 32, R = 12, T = 12, B = 24;
    var iw = W - L - R, ih = H - T - B;
    function y(v) { return T + (1 - Math.min(v, maxVal) / maxVal) * ih; }
    var bw = iw / days.length * 0.62;

    var grid = "", ylab = "";
    var steps = maxVal <= 5 ? [1, 2, 3, 4, 5] : [2, 4, 6, 8, 10];
    steps.forEach(function (v) {
      if (v > maxVal) return;
      grid += "<line x1='" + L + "' y1='" + y(v) + "' x2='" + (W - R) + "' y2='" + y(v) + "' style='stroke:var(--grid)' stroke-width='1'/>";
      ylab += "<text x='" + (L - 6) + "' y='" + (y(v) + 4) + "' text-anchor='end' font-size='10' style='fill:var(--ink-3)'>" + v + "</text>";
    });
    var target = targetVal ? "<line x1='" + L + "' y1='" + y(targetVal) + "' x2='" + (W - R) + "' y2='" + y(targetVal) +
      "' style='stroke:var(--chart-2)' stroke-width='1.5' stroke-dasharray='5 4'/>" : "";

    var bars = "", xlab = "";
    days.forEach(function (iso, i) {
      var v = valueOf(iso);
      var cx = L + (i + 0.5) / days.length * iw;
      if (v != null) {
        var top = y(v);
        bars += "<rect x='" + (cx - bw / 2) + "' y='" + top + "' width='" + bw + "' height='" + Math.max(2, (H - B) - top) +
          "' rx='3' style='fill:var(--chart-1)'><title>" + PL.fmtDate(iso) + ": " + v + unitSuffix + "</title></rect>";
      }
      if (i % 5 === 0) {
        var dt = new Date(iso + "T12:00:00");
        xlab += "<text x='" + cx + "' y='" + (H - 6) + "' text-anchor='middle' font-size='9' style='fill:var(--ink-3)'>" + dt.getDate() + "/" + (dt.getMonth() + 1) + "</text>";
      }
    });
    return "<div class='chart-wrap' style='margin-bottom:10px'><svg viewBox='0 0 " + W + " " + H + "'>" + grid + target + ylab + bars + xlab + "</svg></div>";
  }

  function chartMood(obj) {
    var days = last30Days();
    return svgTrendChart(days, function (iso) { return obj[iso] ? obj[iso].m : null; }, 5, 0, "/5");
  }

  function chartSleep(obj) {
    var days = last30Days();
    function durationH(bed, wake) {
      var b = bed.split(":"), w = wake.split(":");
      var mins = (parseInt(w[0], 10) * 60 + parseInt(w[1], 10)) - (parseInt(b[0], 10) * 60 + parseInt(b[1], 10));
      if (mins <= 0) mins += 24 * 60;
      return mins / 60;
    }
    return svgTrendChart(days, function (iso) { return obj[iso] ? durationH(obj[iso].b, obj[iso].w) : null; }, 11, 8, "h");
  }

  var CHART_RENDERERS = { mood: chartMood, sleep: chartSleep };

  function fmtMood(obj) {
    var keys = Object.keys(obj || {}).sort().reverse().slice(0, 10);
    if (!keys.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + keys.map(function (iso) {
      var e = obj[iso];
      return "<li><strong>" + PL.fmtDate(iso) + "</strong> · " + e.m + "/5" + (e.note ? " · " + PL.esc(e.note) : "") + "</li>";
    }).join("") + "</ul>";
  }
  function fmtGratitude(obj) {
    var keys = Object.keys(obj || {}).sort().reverse().slice(0, 10);
    if (!keys.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + keys.map(function (iso) {
      var items = (obj[iso] || []).filter(Boolean).map(PL.esc).join("; ");
      return "<li><strong>" + PL.fmtDate(iso) + "</strong> · " + items + "</li>";
    }).join("") + "</ul>";
  }
  function fmtSleep(obj) {
    var keys = Object.keys(obj || {}).sort().reverse().slice(0, 10);
    if (!keys.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + keys.map(function (iso) {
      var e = obj[iso];
      return "<li><strong>" + PL.fmtDate(iso) + "</strong> · " + e.b + "→" + e.w + " · " + e.q + "/5" + (e.note ? " · " + PL.esc(e.note) : "") + "</li>";
    }).join("") + "</ul>";
  }
  function fmtHabits(arr) {
    if (!Array.isArray(arr) || !arr.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + arr.map(function (h) {
      var days = Object.keys(h.c || {}).filter(function (k) { return h.c[k]; }).length;
      return "<li>" + h.e + " " + PL.esc(h.n) + " · " + days + " " + PL.t("habit.days") + "</li>";
    }).join("") + "</ul>";
  }
  function fmtWorries(arr) {
    if (!Array.isArray(arr) || !arr.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + arr.slice(-15).reverse().map(function (w) {
      var tag = !w.done ? PL.t("worry.open") : (w.happened ? PL.t("worry.happened") : PL.t("worry.nothappened"));
      return "<li>" + PL.esc(w.text) + " <span class='chip'>" + tag + "</span></li>";
    }).join("") + "</ul>";
  }
  function fmtThoughts(arr) {
    if (!Array.isArray(arr) || !arr.length) return "";
    return "<ul style='margin:0;padding-left:20px'>" + arr.slice(-10).reverse().map(function (t) {
      var delta = (typeof t.int1 === "number" && typeof t.int2 === "number") ? (t.int1 + "% → " + t.int2 + "%") : "";
      return "<li><strong>" + PL.fmtDate(t.date) + "</strong> · " + PL.esc(t.thought) + (delta ? " <span class='chip'>" + delta + "</span>" : "") + "</li>";
    }).join("") + "</ul>";
  }
  var FORMATTERS = {
    test_results: fmtTestResults, mood: fmtMood, gratitude: fmtGratitude,
    sleep: fmtSleep, habits: fmtHabits, worries: fmtWorries, thoughts: fmtThoughts
  };
  var CAT_ICONS = {
    test_results: "📊", mood: "📔", thoughts: "💭", gratitude: "🙏",
    habits: "✅", sleep: "😴", worries: "📦"
  };

  var connections = [];

  function shareCountLabel(n) {
    var word = n === 0 ? PL.t("shared.zero") : PL.t(n === 1 ? "shared.one" : "shared.many");
    return (n === 0 ? "" : n + " ") + word;
  }

  function renderList() {
    var box = $("patients-list");
    var tpl = $("tpl-patient-row");
    box.innerHTML = "";
    PLSync.listConnections().then(function (r) {
      connections = r.asProfessional || [];
      $("patients-count").textContent = connections.length;
      $("patients-empty").classList.toggle("hidden", connections.length > 0);
      connections.forEach(function (conn) {
        var node = tpl.content.firstElementChild.cloneNode(true);
        PL.avatarInto(node.querySelector(".patient-avatar"), { displayName: conn.otherDisplayName, email: conn.otherEmail, avatar: conn.otherAvatar });
        node.querySelector(".patient-email").textContent = conn.otherDisplayName || conn.otherEmail;
        node.querySelector(".patient-since").textContent =
          PL.t("conn.since") + " " + PL.fmtDate(String(conn.since).slice(0, 10));
        var chip = node.querySelector(".patient-share-count");
        node.addEventListener("click", function (e) { e.preventDefault(); openPatient(conn.connectionId); });
        box.appendChild(node);
        PLSync.getShareStatus(conn.connectionId).then(function (status) {
          chip.textContent = shareCountLabel(Object.keys(status).length);
        });
      });
      var hashMatch = location.hash.match(/^#patient=(\d+)$/);
      if (hashMatch) openPatient(Number(hashMatch[1]));
    });
  }

  function openPatient(connectionId) {
    var conn = connections.filter(function (c) { return c.connectionId === connectionId; })[0];
    if (!conn) return;
    location.hash = "patient=" + connectionId;
    $("view-list").classList.add("hidden");
    $("view-detail").classList.remove("hidden");
    PL.avatarInto($("detail-avatar"), { displayName: conn.otherDisplayName, email: conn.otherEmail, avatar: conn.otherAvatar });
    $("detail-email").textContent = conn.otherDisplayName || conn.otherEmail;
    $("detail-since").textContent = PL.t("conn.since") + " " + PL.fmtDate(String(conn.since).slice(0, 10));
    var bioEl = $("detail-bio");
    bioEl.textContent = conn.otherBio || "";
    bioEl.classList.toggle("hidden", !conn.otherBio);
    $("detail-empty").classList.add("hidden");
    var bodyEl = $("detail-body");
    bodyEl.innerHTML = "<p class='small muted'>" + PL.t("loading") + "</p>";
    PLSync.readShared(conn.connectionId, conn.otherPub).then(function (shared) {
      var cats = Object.keys(shared);
      $("detail-empty").classList.toggle("hidden", cats.length > 0);
      var html = "";
      PLSync.shareCategories().forEach(function (cat) {
        if (!shared[cat]) return;
        var fmt = FORMATTERS[cat];
        var body = fmt ? fmt(shared[cat].value) : "";
        if (!body) return;
        var chartFn = CHART_RENDERERS[cat];
        var chart = chartFn ? chartFn(shared[cat].value) : "";
        html += "<div class='interp'><h3>" + (CAT_ICONS[cat] || "") + " " + PL.t("cat." + cat) +
          " <span class='small muted' style='font-weight:400'>(" + PL.t("updated") + " " +
          PL.fmtDate(new Date(shared[cat].updated).toISOString().slice(0, 10)) + ")</span></h3>" + chart + body + "</div>";
      });
      bodyEl.innerHTML = html;
    });
  }

  function closeDetail() {
    location.hash = "";
    $("view-detail").classList.add("hidden");
    $("view-list").classList.remove("hidden");
  }

  function render() {
    if (!window.PLSync || !PLSync.configured()) return;
    var u = PLSync.user();
    if (!u || u.role !== "professional") { show("notpro"); return; }
    show("main");
    myCode = u.professionalCode || "";
    $("my-code").textContent = myCode || "…";
    renderList();
  }

  document.addEventListener("pl:sync-ready", function () {
    render();
    $("btn-copy-code").addEventListener("click", function () {
      if (!myCode) return;
      navigator.clipboard.writeText(myCode).then(function () {
        $("copy-feedback").textContent = PL.t("copied");
        setTimeout(function () { $("copy-feedback").textContent = ""; }, 2000);
      });
    });
    $("link-back").addEventListener("click", function (e) { e.preventDefault(); closeDetail(); });
    window.addEventListener("hashchange", function () {
      if (!location.hash) closeDetail();
    });
  });

  PL.onLang(render);
})();
</script>
