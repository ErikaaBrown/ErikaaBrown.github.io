<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://psicolab-api.nightmareftw.workers.dev; base-uri 'self'; object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Conta · PsicoLab</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1>👤 <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-unconfigured" class="panel hidden">
    <p style="margin:0" data-i18n="unconf.p"></p>
  </section>

  <section id="panel-auth" class="hidden">
    <div class="panel auth-card">
      <div class="auth-side">
        <h2 data-i18n="side.title"></h2>
        <p class="sub" data-i18n="side.sub"></p>
        <ul>
          <li>📱 <span data-i18n="side.b1"></span></li>
          <li>🔒 <span data-i18n="side.b2"></span></li>
          <li>🗝️ <span data-i18n="side.b5"></span></li>
          <li>🗑️ <span data-i18n="side.b4"></span></li>
        </ul>
      </div>
      <div class="auth-main">
        <div class="seg" id="tabs-row">
          <button id="tab-login" class="active" data-i18n="tab.login"></button>
          <button id="tab-signup" data-i18n="tab.signup"></button>
        </div>

        <!-- Entrar / Criar conta -->
        <div id="view-credentials">
          <label class="field-label" for="f-email">Email</label>
          <input type="email" id="f-email" autocomplete="email" data-i18n-ph="ph.email">

          <label class="field-label" for="f-pass"><span data-i18n="lbl.pass"></span></label>
          <div class="pass-wrap">
            <input type="password" id="f-pass" autocomplete="current-password" data-i18n-ph="ph.pass">
            <button type="button" class="pass-eye" id="eye-1" aria-label="mostrar">👁️</button>
          </div>

          <p class="small" id="forgot-link" style="margin:8px 0 0">
            <a href="#" id="link-forgot" data-i18n="link.forgot"></a>
          </p>

          <div id="signup-extra" class="hidden">
            <label class="field-label" for="f-pass2"><span data-i18n="lbl.pass2"></span></label>
            <div class="pass-wrap">
              <input type="password" id="f-pass2" autocomplete="new-password">
              <button type="button" class="pass-eye" id="eye-2" aria-label="mostrar">👁️</button>
            </div>
            <div class="notice" data-i18n-html="warn.e2e"></div>
          </div>

          <div style="position:absolute;left:-9999px;top:-9999px" aria-hidden="true">
            <label for="f-hp">Website</label>
            <input type="text" id="f-hp" name="website" tabindex="-1" autocomplete="off">
          </div>

          <p class="small" id="auth-error" style="color:var(--critical);min-height:1.2em;margin:12px 0 0"></p>

          <button class="btn" id="btn-submit" style="width:100%;margin-top:10px"></button>
        </div>

        <!-- Recuperar acesso: passo 1 -->
        <div id="view-recover-start" class="hidden">
          <p class="small muted" data-i18n="rec.intro" style="margin-top:0"></p>
          <label class="field-label" for="r-email">Email</label>
          <input type="email" id="r-email" autocomplete="email" data-i18n-ph="ph.email">
          <label class="field-label" for="r-code"><span data-i18n="lbl.code"></span></label>
          <input type="text" id="r-code" data-i18n-ph="ph.code" style="font-family:monospace;letter-spacing:0.05em;text-transform:uppercase">
          <p class="small" id="rec-error" style="color:var(--critical);min-height:1.2em;margin:12px 0 0"></p>
          <button class="btn" id="btn-rec-start" style="width:100%;margin-top:10px" data-i18n="btn.continue"></button>
          <p class="small center" style="margin-top:14px">
            <a href="#" id="link-back-1" data-i18n="link.back"></a>
          </p>
        </div>

        <!-- Recuperar acesso: passo 2 -->
        <div id="view-recover-reset" class="hidden">
          <p class="small muted" data-i18n="rec.step2" style="margin-top:0"></p>
          <label class="field-label" for="r-pass"><span data-i18n="lbl.newpass"></span></label>
          <div class="pass-wrap">
            <input type="password" id="r-pass" autocomplete="new-password" data-i18n-ph="ph.pass">
            <button type="button" class="pass-eye" id="eye-3" aria-label="mostrar">👁️</button>
          </div>
          <label class="field-label" for="r-pass2"><span data-i18n="lbl.pass2"></span></label>
          <input type="password" id="r-pass2" autocomplete="new-password">
          <p class="small" id="rec2-error" style="color:var(--critical);min-height:1.2em;margin:12px 0 0"></p>
          <button class="btn" id="btn-rec-reset" style="width:100%;margin-top:10px" data-i18n="btn.setpass"></button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0" data-i18n="how.title"></h3>
      <div class="privacy-steps">
        <div class="privacy-step">
          <span class="ico">🔑</span>
          <div><h4 data-i18n="how.1t"></h4><p data-i18n="how.1p"></p></div>
        </div>
        <div class="privacy-step">
          <span class="ico">🗄️</span>
          <div><h4 data-i18n="how.2t"></h4><p data-i18n="how.2p"></p></div>
        </div>
        <div class="privacy-step">
          <span class="ico">🙈</span>
          <div><h4 data-i18n="how.3t"></h4><p data-i18n="how.3p"></p></div>
        </div>
        <div class="privacy-step">
          <span class="ico">🧭</span>
          <div><h4 data-i18n="how.4t"></h4><p data-i18n="how.4p"></p></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Mostrar o código de recuperação uma única vez -->
  <section id="panel-reveal" class="hidden">
    <div class="panel">
      <h2 style="margin-top:0" id="reveal-title"></h2>
      <p class="muted" id="reveal-lead"></p>
      <div class="recovery-code-box" id="reveal-code"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin:14px 0">
        <button class="btn btn-ghost btn-sm" id="btn-copy-code" data-i18n="btn.copy"></button>
        <span class="small" id="copy-feedback" style="align-self:center;color:var(--brand-ink);font-weight:700"></span>
      </div>
      <div class="notice" data-i18n-html="reveal.warn"></div>
      <label style="display:flex;gap:10px;align-items:flex-start;font-size:0.92rem;cursor:pointer;margin-top:14px">
        <input type="checkbox" id="reveal-ack" style="width:auto;margin-top:4px">
        <span data-i18n="reveal.ack"></span>
      </label>
      <div class="center mt-2">
        <button class="btn" id="btn-reveal-continue" disabled data-i18n="btn.continue2"></button>
      </div>
    </div>
  </section>

  <section id="panel-account" class="hidden">
    <div class="panel">
      <div class="acct-head">
        <span class="avatar" id="acct-avatar"></span>
        <div>
          <h3 style="margin:0"><span data-i18n="acct.hello"></span></h3>
          <p class="small muted" style="margin:2px 0 0" id="acct-email"></p>
        </div>
      </div>
      <p class="small muted" data-i18n="acct.what" style="margin-top:16px"></p>
      <p class="small" id="sync-status" style="font-weight:700;min-height:1.2em"></p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <button class="btn btn-sm" id="btn-sync" data-i18n="btn.sync"></button>
        <button class="btn btn-ghost btn-sm" id="btn-logout" data-i18n="btn.logout"></button>
        <button class="btn btn-danger btn-sm" id="btn-delete" data-i18n="btn.delete" style="margin-left:auto"></button>
      </div>
    </div>
    <div class="panel panel-soft">
      <p class="small" style="margin:0" data-i18n="acct.note"></p>
    </div>

    <div class="panel">
      <h3 style="margin-top:0" data-i18n="profile.title"></h3>
      <p class="small muted" data-i18n="profile.lead"></p>

      <div class="acct-head" style="margin:16px 0">
        <span class="avatar avatar-lg" id="profile-avatar"></span>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="btn-avatar-change" data-i18n="profile.avatar.change"></button>
          <button class="btn btn-ghost btn-sm hidden" id="btn-avatar-remove" data-i18n="profile.avatar.remove"></button>
        </div>
        <input type="file" id="input-avatar-file" accept="image/*" class="hidden">
      </div>

      <label class="field-label" for="f-displayname" data-i18n="profile.name.label"></label>
      <input type="text" id="f-displayname" maxlength="60" data-i18n-ph="profile.name.ph">

      <label class="field-label" for="f-bio" data-i18n="profile.bio.label"></label>
      <textarea id="f-bio" maxlength="500" data-i18n-ph="profile.bio.ph"></textarea>

      <div style="display:flex;gap:10px;align-items:center;margin-top:12px">
        <button class="btn btn-sm" id="btn-save-profile" data-i18n="profile.btn.save"></button>
        <span class="small" id="profile-save-status" style="font-weight:700"></span>
      </div>

      <hr style="border:none;border-top:1px solid var(--line);margin:22px 0">
      <p class="small muted" style="margin:0" data-i18n="profile.export.lead"></p>
      <div class="center mt-2">
        <button class="btn btn-ghost btn-sm" id="btn-export-data" data-i18n="profile.btn.export"></button>
      </div>
    </div>

    <dialog class="crop-dialog" id="dlg-crop">
      <h3 style="margin-top:0" data-i18n="crop.title"></h3>
      <p class="small muted" style="margin:0" data-i18n="crop.lead"></p>
      <div class="crop-stage" id="crop-stage"><img id="crop-img" alt=""></div>
      <input type="range" id="crop-zoom" min="0" max="100" value="0">
      <p class="small" id="crop-error" style="color:var(--critical);min-height:1.2em;margin:6px 0 0"></p>
      <div class="crop-actions">
        <button class="btn btn-ghost btn-sm" id="btn-crop-cancel" data-i18n="crop.cancel"></button>
        <button class="btn btn-sm" id="btn-crop-save" data-i18n="crop.save"></button>
      </div>
    </dialog>

    <div class="panel hidden" id="pro-links">
      <h3 style="margin-top:0" data-i18n="pro.links.title"></h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn btn-ghost btn-sm hidden" id="link-professional" href="professional.html" data-i18n="pro.links.professional"></a>
        <a class="btn btn-ghost btn-sm hidden" id="link-admin" href="admin.html" data-i18n="pro.links.admin"></a>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0" data-i18n="conn.title"></h3>
      <p class="small muted" data-i18n="conn.lead"></p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:200px">
          <label class="field-label" for="f-connect-code" data-i18n="conn.codelabel"></label>
          <input type="text" id="f-connect-code" data-i18n-ph="ph.code2" style="font-family:monospace;letter-spacing:0.05em;text-transform:uppercase">
        </div>
        <button class="btn btn-sm" id="btn-connect" data-i18n="conn.btn"></button>
      </div>
      <p class="small" id="connect-error" style="color:var(--critical);min-height:1.2em;margin:10px 0 0"></p>
    </div>

    <div id="connections-list"></div>
    <template id="tpl-connection">
      <div class="panel conn-card">
        <div class="acct-head">
          <span class="avatar conn-avatar"></span>
          <div style="flex:1;min-width:0">
            <h4 style="margin:0" class="conn-email"></h4>
            <p class="small muted" style="margin:2px 0 0" data-i18n="conn.since"></p>
          </div>
          <button class="btn btn-danger btn-sm conn-disconnect" data-i18n="conn.disconnect"></button>
        </div>
        <p class="small muted conn-bio hidden" style="margin:10px 0 0"></p>
        <p class="small muted" style="margin:14px 0 8px" data-i18n="conn.sharewhat"></p>
        <div class="share-toggles"></div>
      </div>
    </template>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/app.js?v=3"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var mode = "login"; // login | signup | recover-start | recover-reset
  var ready = false;
  var revealCode = null;
  var revealKind = "new"; // new | upgrade
  var currentAvatar = ""; // base64 (sem prefixo), reflecte o que está guardado ou por guardar

  function show(panel) {
    $("panel-unconfigured").classList.toggle("hidden", panel !== "unconf");
    $("panel-auth").classList.toggle("hidden", panel !== "auth");
    $("panel-reveal").classList.toggle("hidden", panel !== "reveal");
    $("panel-account").classList.toggle("hidden", panel !== "account");
  }

  function render() {
    if (!ready || !window.PLSync) return;
    if (!PLSync.configured()) { show("unconf"); return; }
    if (revealCode) { show("reveal"); renderReveal(); return; }
    var u = PLSync.user();
    if (u) {
      show("account");
      $("acct-email").textContent = u.email;
      PL.avatarInto($("acct-avatar"), u);
      $("pro-links").classList.toggle("hidden", u.role !== "professional" && u.role !== "admin");
      $("link-professional").classList.toggle("hidden", u.role !== "professional");
      $("link-admin").classList.toggle("hidden", u.role !== "admin");
      currentAvatar = u.avatar || "";
      PL.avatarInto($("profile-avatar"), u);
      $("btn-avatar-remove").classList.toggle("hidden", !currentAvatar);
      $("f-displayname").value = u.displayName || "";
      $("f-bio").value = u.bio || "";
      renderConnections();
    } else {
      show("auth");
      renderMode();
    }
  }

  function renderMode() {
    var isCred = mode === "login" || mode === "signup";
    $("tabs-row").classList.toggle("hidden", !isCred);
    $("view-credentials").classList.toggle("hidden", !isCred);
    $("view-recover-start").classList.toggle("hidden", mode !== "recover-start");
    $("view-recover-reset").classList.toggle("hidden", mode !== "recover-reset");

    if (isCred) {
      var login = mode === "login";
      $("tab-login").classList.toggle("active", login);
      $("tab-signup").classList.toggle("active", !login);
      $("signup-extra").classList.toggle("hidden", login);
      $("forgot-link").classList.toggle("hidden", !login);
      $("btn-submit").textContent = PL.t(login ? "btn.login" : "btn.signup");
      $("f-pass").setAttribute("autocomplete", login ? "current-password" : "new-password");
      $("auth-error").textContent = "";
    }
  }

  function renderReveal() {
    $("reveal-title").textContent = PL.t(revealKind === "upgrade" ? "reveal.title.upgrade" : "reveal.title.new");
    $("reveal-lead").textContent = PL.t(revealKind === "upgrade" ? "reveal.lead.upgrade" : "reveal.lead.new");
    $("reveal-code").textContent = revealCode;
  }

  function fail(elId, code) {
    var key = "err." + code;
    var msg = PL.t(key);
    $(elId).textContent = msg === key ? PL.t("err.network") : msg;
  }

  function submit() {
    var email = $("f-email").value.trim();
    var pass = $("f-pass").value;
    $("auth-error").textContent = "";
    if (pass.length < 8) { fail("auth-error", "pass.short"); return; }
    if (mode === "signup" && pass !== $("f-pass2").value) { fail("auth-error", "pass.match"); return; }
    $("btn-submit").disabled = true;
    var p = mode === "signup" ? PLSync.register(email, pass, $("f-hp").value) : PLSync.login(email, pass);
    p.then(function (r) {
      $("btn-submit").disabled = false;
      if (r && r.recoveryCode) {
        revealCode = r.recoveryCode;
        revealKind = r.upgraded ? "upgrade" : "new";
      } else {
        var u = PLSync.user();
        var name = u && (u.displayName || u.email.split("@")[0]);
        PL.toast(PL.t("welcome.back") + (name ? ", " + name : "") + " 🌿");
      }
      render();
    }).catch(function (e) {
      $("btn-submit").disabled = false;
      fail("auth-error", e.code || "network");
    });
  }

  function recoverStart() {
    var email = $("r-email").value.trim();
    var code = $("r-code").value.trim();
    $("rec-error").textContent = "";
    if (!code) { fail("rec-error", "code.req"); return; }
    $("btn-rec-start").disabled = true;
    PLSync.recoverStart(email, code).then(function () {
      $("btn-rec-start").disabled = false;
      mode = "recover-reset";
      renderMode();
    }).catch(function (e) {
      $("btn-rec-start").disabled = false;
      fail("rec-error", e.code || "network");
    });
  }

  function recoverReset() {
    var pass = $("r-pass").value;
    $("rec2-error").textContent = "";
    if (pass.length < 8) { fail("rec2-error", "pass.short"); return; }
    if (pass !== $("r-pass2").value) { fail("rec2-error", "pass.match"); return; }
    $("btn-rec-reset").disabled = true;
    PLSync.recoverSetPassword(pass).then(function () {
      $("btn-rec-reset").disabled = false;
      PL.toast(PL.t("sync.done"));
      mode = "login";
      render();
    }).catch(function (e) {
      $("btn-rec-reset").disabled = false;
      fail("rec2-error", e.code || "network");
    });
  }

  function eye(btnId, inputId) {
    $(btnId).addEventListener("click", function () {
      var f = $(inputId);
      f.type = f.type === "password" ? "text" : "password";
      $(btnId).textContent = f.type === "password" ? "👁️" : "🙈";
    });
  }

  /* ---------- recorte da foto de perfil (arrastar + zoom, tudo local) ---------- */
  var STAGE_SIZE = 260;
  var OUTPUT_SIZE = 200;
  var MAX_AVATAR_B64 = 58000; // margem de segurança abaixo do limite do servidor
  var cropState = null; // { natW, natH, scale, minScale, maxScale, x, y }

  function openCropDialog(file) {
    if (!file || file.type.indexOf("image/") !== 0) {
      $("crop-error").textContent = PL.t("crop.err.type");
      return;
    }
    $("crop-error").textContent = "";
    var reader = new FileReader();
    reader.onload = function () {
      var img = $("crop-img");
      img.onload = function () {
        var natW = img.naturalWidth, natH = img.naturalHeight;
        var minScale = Math.max(STAGE_SIZE / natW, STAGE_SIZE / natH);
        cropState = {
          natW: natW, natH: natH, minScale: minScale, maxScale: minScale * 3, scale: minScale,
          x: (STAGE_SIZE - natW * minScale) / 2, y: (STAGE_SIZE - natH * minScale) / 2
        };
        $("crop-zoom").value = 0;
        applyCropTransform();
        $("dlg-crop").showModal();
      };
      img.onerror = function () { $("crop-error").textContent = PL.t("crop.err.fail"); };
      img.src = reader.result;
    };
    reader.onerror = function () { $("crop-error").textContent = PL.t("crop.err.fail"); };
    reader.readAsDataURL(file);
  }

  function clampCropPosition() {
    var w = cropState.natW * cropState.scale, h = cropState.natH * cropState.scale;
    cropState.x = Math.min(0, Math.max(STAGE_SIZE - w, cropState.x));
    cropState.y = Math.min(0, Math.max(STAGE_SIZE - h, cropState.y));
  }

  function applyCropTransform() {
    if (!cropState) return;
    clampCropPosition();
    var img = $("crop-img");
    img.style.width = (cropState.natW * cropState.scale) + "px";
    img.style.height = (cropState.natH * cropState.scale) + "px";
    img.style.left = cropState.x + "px";
    img.style.top = cropState.y + "px";
  }

  function wireCropInteraction() {
    var stage = $("crop-stage");
    var dragging = false, startPX = 0, startPY = 0, startX = 0, startY = 0;
    stage.addEventListener("pointerdown", function (e) {
      if (!cropState) return;
      dragging = true;
      startPX = e.clientX; startPY = e.clientY;
      startX = cropState.x; startY = cropState.y;
      if (stage.setPointerCapture) stage.setPointerCapture(e.pointerId);
    });
    stage.addEventListener("pointermove", function (e) {
      if (!dragging || !cropState) return;
      cropState.x = startX + (e.clientX - startPX);
      cropState.y = startY + (e.clientY - startPY);
      applyCropTransform();
    });
    stage.addEventListener("pointerup", function () { dragging = false; });
    stage.addEventListener("pointercancel", function () { dragging = false; });

    $("crop-zoom").addEventListener("input", function () {
      if (!cropState) return;
      var t = Number(this.value) / 100;
      var newScale = cropState.minScale + t * (cropState.maxScale - cropState.minScale);
      var cx = STAGE_SIZE / 2, cy = STAGE_SIZE / 2;
      var relX = (cx - cropState.x) / cropState.scale, relY = (cy - cropState.y) / cropState.scale;
      cropState.scale = newScale;
      cropState.x = cx - relX * newScale;
      cropState.y = cy - relY * newScale;
      applyCropTransform();
    });
  }

  function exportCroppedAvatar() {
    var img = $("crop-img");
    var canvas = document.createElement("canvas");
    canvas.width = OUTPUT_SIZE;
    canvas.height = OUTPUT_SIZE;
    var ctx = canvas.getContext("2d");
    var srcX = -cropState.x / cropState.scale, srcY = -cropState.y / cropState.scale;
    var srcSize = STAGE_SIZE / cropState.scale;
    ctx.drawImage(img, srcX, srcY, srcSize, srcSize, 0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
    var quality = 0.85;
    var base64 = canvas.toDataURL("image/jpeg", quality).split(",")[1];
    while (base64.length > MAX_AVATAR_B64 && quality > 0.35) {
      quality -= 0.15;
      base64 = canvas.toDataURL("image/jpeg", quality).split(",")[1];
    }
    return base64.length <= MAX_AVATAR_B64 ? base64 : null;
  }

  function saveProfile(overrides) {
    var payload = {
      displayName: $("f-displayname").value, bio: $("f-bio").value,
      avatar: overrides && "avatar" in overrides ? overrides.avatar : currentAvatar
    };
    return PLSync.updateProfile(payload).then(function () {
      currentAvatar = payload.avatar;
      return payload;
    });
  }

  document.addEventListener("pl:sync-ready", function () {
    ready = true;
    render();

    $("tab-login").addEventListener("click", function () { mode = "login"; renderMode(); });
    $("tab-signup").addEventListener("click", function () { mode = "signup"; renderMode(); });
    $("btn-submit").addEventListener("click", submit);
    $("f-pass").addEventListener("keydown", function (e) { if (e.key === "Enter" && mode === "login") submit(); });
    eye("eye-1", "f-pass");
    eye("eye-2", "f-pass2");
    eye("eye-3", "r-pass");

    $("link-forgot").addEventListener("click", function (e) {
      e.preventDefault();
      $("r-email").value = $("f-email").value.trim();
      mode = "recover-start";
      renderMode();
    });
    $("link-back-1").addEventListener("click", function (e) {
      e.preventDefault();
      PLSync.recoverCancel();
      mode = "login";
      renderMode();
    });
    $("btn-rec-start").addEventListener("click", recoverStart);
    $("btn-rec-reset").addEventListener("click", recoverReset);

    $("reveal-ack").addEventListener("change", function () {
      $("btn-reveal-continue").disabled = !this.checked;
    });
    $("btn-copy-code").addEventListener("click", function () {
      navigator.clipboard.writeText(revealCode).then(function () {
        $("copy-feedback").textContent = PL.t("copied");
        setTimeout(function () { $("copy-feedback").textContent = ""; }, 2000);
      });
    });
    $("btn-reveal-continue").addEventListener("click", function () {
      var wasNew = revealKind === "new";
      revealCode = null;
      render();
      if (wasNew) {
        var u = PLSync.user();
        PL.toast(PL.t("welcome.new") + (u && u.displayName ? ", " + u.displayName : "") + " 🌿");
      }
    });

    $("btn-sync").addEventListener("click", function () {
      $("sync-status").textContent = PL.t("sync.ing");
      PLSync.syncNow().then(function (changed) {
        $("sync-status").textContent = PL.t(changed > 0 ? "sync.pulled" : "sync.done");
      }).catch(function () {
        $("sync-status").textContent = PL.t("sync.err");
      });
    });
    $("btn-logout").addEventListener("click", function () {
      PLSync.logout();
      $("sync-status").textContent = "";
      render();
    });
    $("btn-delete").addEventListener("click", function () {
      if (!confirm(PL.t("del.confirm1"))) return;
      if (!confirm(PL.t("del.confirm2"))) return;
      PLSync.deleteAccount().then(render).catch(function () {
        $("sync-status").textContent = PL.t("sync.err");
      });
    });

    wireCropInteraction();
    $("btn-avatar-change").addEventListener("click", function () { $("input-avatar-file").click(); });
    $("input-avatar-file").addEventListener("change", function () {
      var file = this.files && this.files[0];
      if (file) openCropDialog(file);
    });
    $("btn-crop-cancel").addEventListener("click", function () {
      $("dlg-crop").close();
      $("input-avatar-file").value = "";
      cropState = null;
    });
    $("btn-crop-save").addEventListener("click", function () {
      var base64 = exportCroppedAvatar();
      if (!base64) { $("crop-error").textContent = PL.t("crop.err.fail"); return; }
      $("btn-crop-save").disabled = true;
      saveProfile({ avatar: base64 }).then(function () {
        $("btn-crop-save").disabled = false;
        $("dlg-crop").close();
        $("input-avatar-file").value = "";
        cropState = null;
        render();
        PL.toast(PL.t("profile.saved"));
      }).catch(function () {
        $("btn-crop-save").disabled = false;
        $("crop-error").textContent = PL.t("crop.err.fail");
      });
    });
    $("btn-avatar-remove").addEventListener("click", function () {
      saveProfile({ avatar: "" }).then(function () {
        render();
        PL.toast(PL.t("profile.saved"));
      });
    });
    $("btn-save-profile").addEventListener("click", function () {
      $("btn-save-profile").disabled = true;
      $("profile-save-status").textContent = "";
      saveProfile({}).then(function () {
        $("btn-save-profile").disabled = false;
        $("profile-save-status").textContent = PL.t("profile.saved");
        setTimeout(function () { $("profile-save-status").textContent = ""; }, 2400);
      }).catch(function () {
        $("btn-save-profile").disabled = false;
        $("profile-save-status").textContent = PL.t("profile.err");
      });
    });

    $("btn-export-data").addEventListener("click", function () {
      var u = PLSync.user();
      var out = {
        exportedAt: new Date().toISOString(),
        email: u ? u.email : "",
        profile: u ? { displayName: u.displayName, bio: u.bio, avatar: u.avatar } : {},
        data: {}
      };
      var LIST_TOOLS = ["habits", "thoughts", "worries", "test_results"];
      PLSync.syncedTools().forEach(function (tool) {
        out.data[tool] = PL.load(tool, LIST_TOOLS.indexOf(tool) >= 0 ? [] : {});
      });
      var blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "psicolab-dados-" + PL.todayISO() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    $("btn-connect").addEventListener("click", function () {
      var code = $("f-connect-code").value.trim();
      $("connect-error").textContent = "";
      if (!code) return;
      $("btn-connect").disabled = true;
      PLSync.connect(code).then(function () {
        $("btn-connect").disabled = false;
        $("f-connect-code").value = "";
        PL.toast(PL.t("conn.connected"));
        renderConnections();
      }).catch(function (e) {
        $("btn-connect").disabled = false;
        var key = "err." + (e.code || "network");
        var msg = PL.t(key);
        $("connect-error").textContent = msg === key ? PL.t("err.network") : msg;
      });
    });
  });

  function renderConnections() {
    var box = $("connections-list");
    var tpl = $("tpl-connection");
    box.innerHTML = "";
    PLSync.listConnections().then(function (r) {
      var list = r.asPatient || [];
      if (!list.length) {
        var p = document.createElement("p");
        p.className = "small muted";
        p.textContent = PL.t("conn.empty");
        box.appendChild(p);
        return;
      }
      list.forEach(function (conn) {
        var node = tpl.content.firstElementChild.cloneNode(true);
        PL.avatarInto(node.querySelector(".conn-avatar"), { displayName: conn.otherDisplayName, email: conn.otherEmail, avatar: conn.otherAvatar });
        node.querySelector(".conn-email").textContent = conn.otherDisplayName || conn.otherEmail;
        var bioEl = node.querySelector(".conn-bio");
        if (conn.otherBio) { bioEl.textContent = conn.otherBio; bioEl.classList.remove("hidden"); }
        node.querySelector("[data-i18n='conn.since']").textContent =
          PL.t("conn.since") + " " + PL.fmtDate(String(conn.since).slice(0, 10));
        node.querySelector(".conn-disconnect").textContent = PL.t("conn.disconnect");
        node.querySelector("[data-i18n='conn.sharewhat']").textContent = PL.t("conn.sharewhat");
        node.querySelector(".conn-disconnect").addEventListener("click", function () {
          if (!confirm(PL.t("conn.disconnect.confirm"))) return;
          PLSync.disconnect(conn.connectionId).then(renderConnections);
        });

        var togglesBox = node.querySelector(".share-toggles");
        PLSync.getShareStatus(conn.connectionId).then(function (onMap) {
          PLSync.shareCategories().forEach(function (cat) {
            var b = document.createElement("button");
            b.className = "tag-btn" + (onMap[cat] ? " sel" : "");
            b.textContent = PL.t("cat." + cat);
            b.addEventListener("click", function () {
              var turningOn = !b.classList.contains("sel");
              b.disabled = true;
              PLSync.setShare(conn.connectionId, cat, conn.otherPub, turningOn).then(function () {
                b.disabled = false;
                b.classList.toggle("sel", turningOn);
              }).catch(function () {
                b.disabled = false;
              });
            });
            togglesBox.appendChild(b);
          });
        });

        box.appendChild(node);
      });
    });
  }

  PL.onLang(function () {
    render();
  });
})();
</script>
