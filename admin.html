        </tr></thead>

    </div>

  </section>
</main>

<div id="site-footer"></div>

<script>

      "btn.toaccount": "← Voltar à conta",
      "search.label": "Procurar por email",
      "search.ph": "parte do email...",
      "btn.search": "Procurar",
      "col.email": "Email", "col.role": "Papel", "col.code": "Código", "col.since": "Criada em",
      "results.empty": "Sem resultados.",
      "role.user": "Utilizador", "role.professional": "Profissional", "role.admin": "Administrador",
      "btn.makepro": "Tornar profissional",
      "btn.makeuser": "Reverter para utilizador",
      "confirm.makepro": "Marcar esta conta como profissional? Vai receber um código para os pacientes se ligarem.",
      "confirm.makeuser": "Reverter esta conta para utilizador normal? O código profissional deixa de poder ser usado para novas ligações.",
      "code.generated": "Código gerado: "
    },
    en: {
      "page.title": "Administration",
      "crumb": "PsicoLab",
      "intro.lead": "Grant professional status to psychologist, psychiatrist and other clinician accounts. Only your account can do this.",
      "notadmin.p": "This page is restricted to PsychLab administration.",
      "btn.toaccount": "← Back to account",
      "search.label": "Search by email",
      "search.ph": "part of the email...",
      "btn.search": "Search",
      "col.email": "Email", "col.role": "Role", "col.code": "Code", "col.since": "Created at",
      "results.empty": "No results.",
      "role.user": "User", "role.professional": "Professional", "role.admin": "Admin",
      "btn.makepro": "Make professional",
      "btn.makeuser": "Revert to user",
      "confirm.makepro": "Mark this account as professional? They will receive a code for patients to connect with.",
      "confirm.makeuser": "Revert this account to a normal user? The professional code stops working for new connections.",
      "code.generated": "Generated code: "

  }
};

<script src="js/app.js?v=3"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };

  function show(panel) {
    $("panel-notadmin").classList.toggle("hidden", panel !== "notadmin");
    $("panel-main").classList.toggle("hidden", panel !== "main");
  }

  function renderRows(users) {
    var body = $("users-body");
    body.innerHTML = "";
    $("results-empty").classList.toggle("hidden", users.length > 0);
    users.forEach(function (u) {
      var tr = document.createElement("tr");
      var actions = "";
      if (u.role !== "admin") {
        actions = u.role === "professional"
          ? "<button class='btn btn-ghost btn-sm' data-act='demote' data-id='" + u.id + "'>" + PL.t("btn.makeuser") + "</button>"
          : "<button class='btn btn-sm' data-act='promote' data-id='" + u.id + "'>" + PL.t("btn.makepro") + "</button>";
      }
      var who = u.display_name
        ? "<strong>" + PL.esc(u.display_name) + "</strong><br><span class='small muted'>" + PL.esc(u.email) + "</span>"
        : PL.esc(u.email);
      tr.innerHTML =
        "<td>" + who + "</td>" +
        "<td>" + PL.t("role." + u.role) + "</td>" +
        "<td style='font-family:monospace'>" + (u.professional_code || "") + "</td>" +
        "<td>" + PL.fmtDate(String(u.created_at).slice(0, 10)) + "</td>" +
        "<td>" + actions + "</td>";
      body.appendChild(tr);
    });
    body.querySelectorAll("[data-act]").forEach(function (b) {
      b.addEventListener("click", function () {
        var id = b.getAttribute("data-id");
        var promote = b.getAttribute("data-act") === "promote";
        if (!confirm(PL.t(promote ? "confirm.makepro" : "confirm.makeuser"))) return;
        b.disabled = true;
        PLSync.adminSetRole(id, promote ? "professional" : "user").then(function (r) {
          if (promote && r.professionalCode) PL.toast(PL.t("code.generated") + r.professionalCode);
          runSearch();
        }).catch(function () {
          b.disabled = false;
        });
      });
    });
  }

  function runSearch() {
    PLSync.adminSearchUsers($("f-search").value.trim()).then(function (r) {
      renderRows(r.users || []);
    });
  }

  function render() {
    if (!window.PLSync || !PLSync.configured()) return;
    var u = PLSync.user();
    if (!u || u.role !== "admin") { show("notadmin"); return; }
    show("main");
    runSearch();
  }

  document.addEventListener("pl:sync-ready", function () {
    render();
    $("btn-search").addEventListener("click", runSearch);
    $("f-search").addEventListener("keydown", function (e) { if (e.key === "Enter") runSearch(); });
  });

  PL.onLang(render);
})();
</script>
</body>
</html>
