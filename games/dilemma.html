<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilema do Prisioneiro · PsicoLab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1>⚖️ <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-intro" class="panel">
    <p data-i18n="intro.p1"></p>
    <div class="table-scroll" style="margin:18px 0">
      <table class="payoff">
        <tr><th></th><th data-i18n="mx.coop2"></th><th data-i18n="mx.defect2"></th></tr>
        <tr><th data-i18n="mx.coop1"></th><td><strong>3 / 3</strong></td><td>0 / 5</td></tr>
        <tr><th data-i18n="mx.defect1"></th><td>5 / 0</td><td>1 / 1</td></tr>
      </table>
    </div>
    <p class="small muted" data-i18n="mx.note"></p>
    <p data-i18n="intro.p2"></p>
    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>
    </div>
  </section>

  <section id="panel-game" class="panel hidden">
    <div style="display:flex;justify-content:space-between;font-weight:800;flex-wrap:wrap;gap:8px">
      <span id="hud-round"></span>
      <span id="hud-totals"></span>
    </div>
    <div class="game-stage" style="min-height:auto;padding:22px 0">
      <p data-i18n="game.q" style="margin:0;font-family:var(--font-display);font-size:1.25rem"></p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="btn" id="btn-coop"></button>
        <button class="btn btn-ghost" id="btn-defect"></button>
      </div>
    </div>
    <div class="table-scroll">
      <table class="data" id="log-table">
        <thead><tr><th>#</th><th data-i18n="log.you"></th><th data-i18n="log.opp"></th><th data-i18n="log.pts"></th></tr></thead>
        <tbody id="log"></tbody>
      </table>
    </div>
  </section>

  <section id="panel-result" class="hidden">
    <div class="panel">
      <h2 style="margin-top:0" data-i18n="res.title"></h2>
      <p id="verdict" style="font-weight:700"></p>
      <div class="rbar">
        <div class="rbar-head"><span data-i18n="log.you"></span><span class="val" id="bar-you-val"></span></div>
        <div class="track"><div class="fill" id="bar-you" style="background:var(--chart-1)"></div></div>
      </div>
      <div class="rbar">
        <div class="rbar-head"><span data-i18n="log.opp"></span><span class="val" id="bar-opp-val"></span></div>
        <div class="track"><div class="fill" id="bar-opp" style="background:var(--chart-2)"></div></div>
      </div>
      <div class="interp" id="strategy-reveal"></div>
    </div>
    <div class="panel panel-soft">
      <p style="margin:0" data-i18n="res.expl"></p>
    </div>
    <div class="center mt-2">
      <button class="btn" id="btn-again" data-i18n="btn.again"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
window.PAGE = {
  root: "../",
  section: "games",
  i18n: {
    pt: {
      "page.title": "Dilema do Prisioneiro",
      "crumb": "Jogos",
      "intro.lead": "O problema mais famoso da teoria dos jogos: cooperar compensa — mas só se o outro também cooperar.",
      "intro.p1": "Em cada ronda, tu e o teu adversário escolhem em segredo: cooperar ou trair. Os pontos (teus / dele) dependem da combinação:",
      "mx.coop1": "Tu cooperas", "mx.defect1": "Tu trais",
      "mx.coop2": "Ele coopera", "mx.defect2": "Ele trai",
      "mx.note": "Trair rende sempre mais numa ronda isolada... mas isto são 10 rondas contra o mesmo adversário — e ele tem memória.",
      "intro.p2": "O adversário segue uma estratégia secreta, escolhida ao acaso. Só é revelada no fim. Consegues adivinhá-la a meio do jogo?",
      "btn.start": "Jogar (10 rondas)",
      "btn.again": "Jogar contra outro adversário",
      "game.q": "Que escolhes nesta ronda?",
      "btn.coop": "🤝 Cooperar",
      "btn.defect": "🔪 Trair",
      "hud.round": "Ronda ",
      "log.you": "Tu", "log.opp": "Adversário", "log.pts": "Pontos",
      "act.C": "🤝", "act.D": "🔪",
      "res.title": "Fim do jogo",
      "res.win": "Ficaste à frente! Mas repara: no dilema do prisioneiro repetido, a verdadeira vitória é o total conjunto — a confiança mútua rende mais do que qualquer vitória isolada.",
      "res.lose": "O adversário ficou à frente. Provavelmente aproveitou-se de uma traição — ou tu pagaste caro por confiar. Vê a estratégia dele em baixo.",
      "res.tie": "Empate! Um resultado clássico entre estratégias recíprocas.",
      "strat.title": "A estratégia secreta era: ",
      "res.expl": "🧠 Porque importa: nos torneios de Robert Axelrod (1980), a estratégia vencedora foi a mais simples — Olho por Olho: começa a cooperar, e depois faz o que o outro fez. Era simpática, retaliadora, indulgente e clara. A lição para a vida real: a cooperação estável nasce de reciprocidade com memória curta para ofensas — não de bondade cega nem de desconfiança permanente."
    },
    en: {
      "page.title": "Prisoner's Dilemma",
      "crumb": "Games",
      "intro.lead": "Game theory's most famous problem: cooperation pays — but only if the other side cooperates too.",
      "intro.p1": "Each round, you and your opponent secretly choose: cooperate or defect. The points (yours / theirs) depend on the combination:",
      "mx.coop1": "You cooperate", "mx.defect1": "You defect",
      "mx.coop2": "They cooperate", "mx.defect2": "They defect",
      "mx.note": "Defecting always pays more in a single round... but this is 10 rounds against the same opponent — and they have memory.",
      "intro.p2": "The opponent follows a secret strategy, picked at random. It is only revealed at the end. Can you guess it mid-game?",
      "btn.start": "Play (10 rounds)",
      "btn.again": "Play against another opponent",
      "game.q": "What do you choose this round?",
      "btn.coop": "🤝 Cooperate",
      "btn.defect": "🔪 Defect",
      "hud.round": "Round ",
      "log.you": "You", "log.opp": "Opponent", "log.pts": "Points",
      "act.C": "🤝", "act.D": "🔪",
      "res.title": "Game over",
      "res.win": "You came out ahead! But note: in the repeated prisoner's dilemma, the real win is the joint total — mutual trust earns more than any single victory.",
      "res.lose": "The opponent came out ahead. They probably exploited a betrayal — or you paid dearly for trusting. See their strategy below.",
      "res.tie": "A tie! A classic outcome between reciprocal strategies.",
      "strat.title": "The secret strategy was: ",
      "res.expl": "🧠 Why it matters: in Robert Axelrod's tournaments (1980), the winning strategy was the simplest — Tit for Tat: start by cooperating, then do whatever the other did. It was nice, retaliatory, forgiving and clear. The real-life lesson: stable cooperation grows from reciprocity with a short memory for offences — not from blind kindness or permanent distrust."
    }
  }
};
</script>
<script src="../js/app.js"></script>
<script>
(function () {
  var STRATEGIES = [
    { id: "tft",
      name: { pt: "Olho por Olho (Tit for Tat)", en: "Tit for Tat" },
      desc: { pt: "Cooperou na primeira ronda e depois copiou sempre a tua jogada anterior. A campeã de Axelrod.", en: "Cooperated in the first round, then always copied your previous move. Axelrod's champion." },
      play: function (h) { return h.you.length === 0 ? "C" : h.you[h.you.length - 1]; } },
    { id: "grim",
      name: { pt: "Rancoroso (Grim Trigger)", en: "Grim Trigger" },
      desc: { pt: "Cooperou até à tua primeira traição — e a partir daí traiu para sempre. Não perdoa.", en: "Cooperated until your first betrayal — and from then on defected forever. It does not forgive." },
      play: function (h) { return h.you.indexOf("D") >= 0 ? "D" : "C"; } },
    { id: "alld",
      name: { pt: "Sempre Trair", en: "Always Defect" },
      desc: { pt: "Traiu em todas as rondas, sem excepção. Racional numa ronda única, desastroso em relações longas.", en: "Defected every single round. Rational in a one-shot game, disastrous in long relationships." },
      play: function () { return "D"; } },
    { id: "allc",
      name: { pt: "Sempre Cooperar", en: "Always Cooperate" },
      desc: { pt: "Cooperou sempre, acontecesse o que acontecesse. Generoso — e facílimo de explorar.", en: "Always cooperated, no matter what. Generous — and extremely easy to exploit." },
      play: function () { return "C"; } },
    { id: "random",
      name: { pt: "Aleatório", en: "Random" },
      desc: { pt: "Escolheu ao calhas em cada ronda. Contra o caos, nenhuma estratégia de confiança se consegue formar.", en: "Chose at random every round. Against chaos, no strategy of trust can form." },
      play: function () { return Math.random() < 0.5 ? "C" : "D"; } },
    { id: "pavlov",
      name: { pt: "Pavlov (ganhou-fica, perdeu-muda)", en: "Pavlov (win-stay, lose-shift)" },
      desc: { pt: "Se a última ronda lhe correu bem, repetiu a jogada; se correu mal, mudou. Uma regra de aprendizagem simples que coopera bem — mas explora quem perdoa demasiado.", en: "If the last round went well for it, it repeated the move; if it went badly, it switched. A simple learning rule that cooperates well — but exploits those who forgive too much." },
      play: function (h) {
        if (!h.opp.length) return "C";
        var o = h.opp[h.opp.length - 1], y = h.you[h.you.length - 1];
        var won = y === "C"; // recebeu 3 (CC) ou 5 (DC): em ambos os casos, tu cooperaste
        return won ? o : (o === "C" ? "D" : "C");
      } },
    { id: "gtft",
      name: { pt: "Olho por Olho Generoso", en: "Generous Tit for Tat" },
      desc: { pt: "Como o Olho por Olho, mas perdoou cerca de um terço das traições. Em ambientes com ruído, a generosidade evita ciclos infinitos de vingança.", en: "Like Tit for Tat, but it forgave about a third of betrayals. In noisy environments, generosity prevents endless cycles of revenge." },
      play: function (h) {
        if (!h.you.length) return "C";
        var last = h.you[h.you.length - 1];
        if (last === "D" && Math.random() < 0.33) return "C";
        return last;
      } }
  ];

  var PAYOFF = { CC: [3, 3], CD: [0, 5], DC: [5, 0], DD: [1, 1] };
  var ROUNDS = 10;

  var $ = function (id) { return document.getElementById(id); };
  var state = "intro";
  var strat = null;
  var hist = { you: [], opp: [] };
  var youPts = 0, oppPts = 0, round = 0;

  function show(p) {
    $("panel-intro").classList.toggle("hidden", p !== "intro");
    $("panel-game").classList.toggle("hidden", p !== "game");
    $("panel-result").classList.toggle("hidden", p !== "result");
    state = p;
  }

  function hud() {
    $("hud-round").textContent = PL.t("hud.round") + Math.min(round + 1, ROUNDS) + " / " + ROUNDS;
    $("hud-totals").textContent = PL.t("log.you") + " " + youPts + " · " + PL.t("log.opp") + " " + oppPts;
    $("btn-coop").textContent = PL.t("btn.coop");
    $("btn-defect").textContent = PL.t("btn.defect");
  }

  function renderLog() {
    var rows = "";
    for (var i = hist.you.length - 1; i >= 0; i--) {
      var key = hist.you[i] + hist.opp[i];
      var p = PAYOFF[key];
      rows += "<tr><td>" + (i + 1) + "</td><td>" + PL.t("act." + hist.you[i]) + "</td><td>" + PL.t("act." + hist.opp[i]) + "</td><td>+" + p[0] + " / +" + p[1] + "</td></tr>";
    }
    $("log").innerHTML = rows;
  }

  function choose(you) {
    if (state !== "game") return;
    var opp = strat.play(hist);
    hist.you.push(you);
    hist.opp.push(opp);
    var p = PAYOFF[you + opp];
    youPts += p[0];
    oppPts += p[1];
    round++;
    renderLog();
    if (round >= ROUNDS) {
      finish();
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      hud();
    }
  }

  function finish() {
    show("result");
    var maxPts = Math.max(youPts, oppPts, 1);
    $("bar-you").style.width = (youPts / maxPts * 100) + "%";
    $("bar-opp").style.width = (oppPts / maxPts * 100) + "%";
    $("bar-you-val").textContent = youPts;
    $("bar-opp-val").textContent = oppPts;
    $("verdict").textContent = PL.t(youPts > oppPts ? "res.win" : youPts < oppPts ? "res.lose" : "res.tie");
    $("strategy-reveal").innerHTML = "<h3>🎭 " + PL.t("strat.title") + strat.name[PL.lang] + "</h3><p>" + strat.desc[PL.lang] + "</p>";
  }

  function start() {
    var lastId = PL.load("dilemma_last", null);
    var pool = STRATEGIES.filter(function (s) { return s.id !== lastId; });
    strat = pool[Math.floor(Math.random() * pool.length)];
    PL.store("dilemma_last", strat.id);
    hist = { you: [], opp: [] };
    youPts = 0; oppPts = 0; round = 0;
    show("game");
    hud();
    renderLog();
  }

  $("btn-start").addEventListener("click", start);
  $("btn-again").addEventListener("click", function () {
    start();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  $("btn-coop").addEventListener("click", function () { choose("C"); });
  $("btn-defect").addEventListener("click", function () { choose("D"); });

  PL.onLang(function () {
    if (state === "game") { hud(); renderLog(); }
    if (state === "result") finish();
  });
})();
</script>
</body>
</html>
