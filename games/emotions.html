<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://psicolab-api.nightmareftw.workers.dev; base-uri 'self'; object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Reconhecer Emoções · PsicoLab</title>
<link rel="icon" type="image/png" href="../img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=13">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1><img src="../img/icon-emotions.png" alt=""> <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-intro" class="panel">
    <p data-i18n="intro.p1"></p>
    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>
    </div>
  </section>

  <section id="panel-game" class="panel hidden">
    <div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <p class="small muted" id="qcount"></p>
    <div class="game-stage" style="min-height:auto;padding:10px 0 20px">
      <div class="big-emoji hidden" id="face"></div>
      <div class="scenario-box hidden" id="scene"></div>
      <p class="small muted" id="prompt-q"></p>
      <div class="opt-list" id="opts" style="width:100%;max-width:480px"></div>
    </div>
    <div id="feedback" class="hidden">
      <div class="notice" id="feedback-text"></div>
      <div class="center">
        <button class="btn btn-sm" id="btn-next" data-i18n="btn.next"></button>
      </div>
    </div>
  </section>

  <section id="panel-result" class="hidden">
    <div class="panel center">
      <h2 style="margin-top:0" data-i18n="res.title"></h2>
      <div class="tiles" style="max-width:220px;margin:1rem auto">
        <div class="tile"><div class="num" id="r-score"></div><div class="lbl" data-i18n="res.score"></div></div>
      </div>
      <p id="r-comment" class="muted"></p>
    </div>
    <div class="panel panel-soft">
      <p style="margin:0" data-i18n="res.expl"></p>
    </div>
    <div class="center mt-2">
      <button class="btn" id="btn-again" data-i18n="btn.again"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
window.PAGE = {
  root: "../",
  section: "games",
  i18n: {
    pt: {
      "page.title": "Reconhecer Emoções",
      "crumb": "Jogos",
      "intro.lead": "Ler emoções (em caras e em contextos) é uma competência treinável, e a base da empatia.",
      "intro.p1": "Vais ver 12 rondas: umas mostram uma expressão facial, outras descrevem uma situação. Escolhe a emoção que melhor corresponde. No fim de cada ronda explicamos as pistas.",
      "btn.start": "Começar",
      "btn.next": "Seguinte →",
      "btn.again": "Jogar outra vez",
      "q.face": "Que emoção mostra esta cara?",
      "q.scene": "Qual é a emoção principal desta situação?",
      "fb.right": "✔️ Certo! ",
      "fb.wrong": "✖️ A resposta era «",
      "fb.wrong2": "». ",
      "res.title": "Resultado",
      "res.score": "em 12",
      "res.c1": "Um olho clínico para emoções! A tua leitura de pistas emocionais é muito fina.",
      "res.c2": "Boa leitura emocional: as rondas que falhaste são as distinções mais difíceis (e mais interessantes).",
      "res.c3": "As emoções confundem-se mesmo umas com as outras, e distingui-las treina-se. Repete o jogo e repara nas pistas das explicações.",
      "res.expl": "🧠 Porque importa: a capacidade de distinguir emoções com precisão chama-se granularidade emocional. A investigação de Lisa Feldman Barrett mostra que pessoas com maior granularidade regulam melhor as emoções: dizer «estou frustrado» em vez de «estou mal» já muda a forma como o cérebro responde."
    },
    en: {
      "page.title": "Reading Emotions",
      "crumb": "Games",
      "intro.lead": "Reading emotions (in faces and in contexts) is a trainable skill, and the foundation of empathy.",
      "intro.p1": "You will play 12 rounds: some show a facial expression, others describe a situation. Choose the emotion that fits best. After each round we explain the cues.",
      "btn.start": "Start",
      "btn.next": "Next →",
      "btn.again": "Play again",
      "q.face": "Which emotion does this face show?",
      "q.scene": "What is the main emotion in this situation?",
      "fb.right": "✔️ Correct! ",
      "fb.wrong": "✖️ The answer was \"",
      "fb.wrong2": "\". ",
      "res.title": "Result",
      "res.score": "out of 12",
      "res.c1": "A clinical eye for emotions! Your reading of emotional cues is very sharp.",
      "res.c2": "Good emotional reading: the rounds you missed are the hardest (and most interesting) distinctions.",
      "res.c3": "Emotions genuinely blur into each other, and telling them apart is trainable. Play again and note the cues in the explanations.",
      "res.expl": "🧠 Why it matters: the ability to distinguish emotions precisely is called emotional granularity. Lisa Feldman Barrett's research shows that people with higher granularity regulate emotions better: saying \"I'm frustrated\" instead of \"I feel bad\" already changes how the brain responds."
    }
  }
};
</script>
<script src="../js/app.js?v=5"></script>
<script>
(function () {
  var E = {
    joy:        { pt: "alegria", en: "joy" },
    sadness:    { pt: "tristeza", en: "sadness" },
    anger:      { pt: "raiva", en: "anger" },
    fear:       { pt: "medo", en: "fear" },
    surprise:   { pt: "surpresa", en: "surprise" },
    disgust:    { pt: "nojo", en: "disgust" },
    serenity:   { pt: "serenidade", en: "serenity" },
    anxiety:    { pt: "ansiedade", en: "anxiety" },
    shame:      { pt: "vergonha", en: "embarrassment" },
    frustration:{ pt: "frustração", en: "frustration" },
    boredom:    { pt: "tédio", en: "boredom" },
    dejection:  { pt: "desânimo", en: "dejection" }
  };

  var ROUNDS = [
    { face: "😊", ans: "joy", opts: ["joy", "serenity", "surprise", "shame"],
      ex: { pt: "O sorriso genuíno (de Duchenne) envolve também os olhos: as «rugas» nos cantos são a pista.", en: "A genuine (Duchenne) smile also involves the eyes: the crinkles at the corners are the cue." } },
    { scene: { pt: "O João recebe uma mensagem do chefe: «Precisamos de falar amanhã.» Passa a noite a imaginar cenários.", en: "João gets a message from his boss: \"We need to talk tomorrow.\" He spends the night imagining scenarios." },
      ans: "anxiety", opts: ["anxiety", "fear", "anger", "sadness"],
      ex: { pt: "Ameaça difusa, futura e incerta = ansiedade. O medo responde a um perigo presente e concreto.", en: "A diffuse, future, uncertain threat = anxiety. Fear responds to a present, concrete danger." } },
    { face: "😢", ans: "sadness", opts: ["sadness", "dejection", "fear", "shame"],
      ex: { pt: "Lágrimas e cantos da boca descaídos. A tristeza sinaliza perda, e convida os outros a aproximarem-se.", en: "Tears and downturned mouth corners. Sadness signals loss, and invites others to come closer." } },
    { scene: { pt: "A Marta conta uma piada na reunião e ninguém se ri. Sente a cara a aquecer e só quer desaparecer.", en: "Marta tells a joke in a meeting and nobody laughs. She feels her face heating up and just wants to disappear." },
      ans: "shame", opts: ["shame", "sadness", "anger", "anxiety"],
      ex: { pt: "Falha social perante uma audiência + rubor: a assinatura do embaraço, uma emoção especificamente social.", en: "A social slip before an audience + blushing: the signature of embarrassment, a specifically social emotion." } },
    { face: "😠", ans: "anger", opts: ["anger", "disgust", "frustration", "fear"],
      ex: { pt: "Sobrancelhas franzidas e puxadas para baixo, lábios cerrados. A raiva mobiliza energia contra um obstáculo ou injustiça.", en: "Brows drawn down and together, pressed lips. Anger mobilises energy against an obstacle or injustice." } },
    { scene: { pt: "O Pedro emprestou dinheiro a um amigo. O amigo nunca pagou, e agora publica fotos de férias caras.", en: "Pedro lent money to a friend. The friend never paid it back, and now posts photos of expensive holidays." },
      ans: "anger", opts: ["anger", "disgust", "sadness", "surprise"],
      ex: { pt: "Injustiça percebida e quebra de confiança: o gatilho clássico da raiva.", en: "Perceived injustice and broken trust: the classic trigger of anger." } },
    { face: "😨", ans: "fear", opts: ["fear", "surprise", "anxiety", "disgust"],
      ex: { pt: "Olhos muito abertos e sobrancelhas levantadas: o medo alarga o campo visual para captar mais informação sobre a ameaça.", en: "Wide-open eyes and raised brows: fear widens the visual field to gather more information about the threat." } },
    { face: "🤢", ans: "disgust", opts: ["disgust", "anger", "sadness", "boredom"],
      ex: { pt: "Nariz franzido e lábio superior levantado. O nojo evoluiu para nos proteger de contaminação: física e moral.", en: "Wrinkled nose and raised upper lip. Disgust evolved to protect us from contamination: physical and moral." } },
    { scene: { pt: "A Sofia trabalhou meses num projecto. A uma semana do fim, a empresa cancela-o sem explicação.", en: "Sofia worked for months on a project. One week before the end, the company cancels it without explanation." },
      ans: "frustration", opts: ["frustration", "sadness", "boredom", "serenity"],
      ex: { pt: "Objectivo bloqueado mesmo à beira da meta: é a definição de frustração, parente próxima da raiva, mas virada para o obstáculo.", en: "A goal blocked right at the finish line: the definition of frustration, a close relative of anger, aimed at the obstacle." } },
    { face: "😌", ans: "serenity", opts: ["serenity", "joy", "boredom", "sadness"],
      ex: { pt: "Músculos faciais soltos, pálpebras suaves. Calma não é ausência de emoção; é uma emoção de baixa activação e valência positiva.", en: "Loose facial muscles, soft eyelids. Calm is not the absence of emotion; it is a low-arousal, positive-valence emotion." } },
    { scene: { pt: "Domingo à tarde. O Miguel salta de série em série, nada lhe apetece, o tempo arrasta-se.", en: "Sunday afternoon. Miguel hops from show to show, nothing appeals, time drags." },
      ans: "boredom", opts: ["boredom", "sadness", "dejection", "serenity"],
      ex: { pt: "Baixa activação sem perda associada: tédio, não tristeza. O tédio sinaliza falta de sentido na actividade actual.", en: "Low arousal with no associated loss: boredom, not sadness. Boredom signals a lack of meaning in the current activity." } },
    { face: "😳", ans: "shame", opts: ["shame", "surprise", "fear", "anger"],
      ex: { pt: "Rubor e olhar que quer fugir: o embaraço pede desculpa ao grupo sem palavras, e por isso desarma julgamentos.", en: "Blushing and an averted gaze: embarrassment apologises to the group without words, which is why it disarms judgement." } }
  ];

  var $ = function (id) { return document.getElementById(id); };
  var idx = 0, score = 0, state = "intro", answered = false;

  function show(p) {
    $("panel-intro").classList.toggle("hidden", p !== "intro");
    $("panel-game").classList.toggle("hidden", p !== "game");
    $("panel-result").classList.toggle("hidden", p !== "result");
    state = p;
  }

  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var currentOrder = [];

  function renderRound(reshuffle) {
    var r = ROUNDS[idx];
    answered = false;
    $("qcount").textContent = (idx + 1) + " / " + ROUNDS.length;
    $("pfill").style.width = (idx / ROUNDS.length * 100) + "%";
    $("feedback").classList.add("hidden");
    $("face").classList.toggle("hidden", !r.face);
    $("scene").classList.toggle("hidden", !r.scene);
    if (r.face) $("face").textContent = r.face;
    if (r.scene) $("scene").textContent = r.scene[PL.lang];
    $("prompt-q").textContent = PL.t(r.face ? "q.face" : "q.scene");
    if (reshuffle) currentOrder = shuffle(r.opts);
    var box = $("opts");
    box.innerHTML = "";
    currentOrder.forEach(function (key) {
      var b = document.createElement("button");
      b.className = "opt-btn";
      b.textContent = E[key][PL.lang];
      b.addEventListener("click", function () { pick(key, b); });
      box.appendChild(b);
    });
  }

  function pick(key, btn) {
    if (answered) return;
    answered = true;
    var r = ROUNDS[idx];
    var right = key === r.ans;
    if (right) score++;
    $("opts").querySelectorAll(".opt-btn").forEach(function (b) {
      if (b.textContent === E[r.ans][PL.lang]) b.classList.add("correct");
    });
    if (!right) btn.classList.add("wrong");
    var prefix = right ? PL.t("fb.right") : PL.t("fb.wrong") + E[r.ans][PL.lang] + PL.t("fb.wrong2");
    $("feedback-text").textContent = prefix + r.ex[PL.lang];
    $("feedback").classList.remove("hidden");
  }

  function next() {
    idx++;
    if (idx >= ROUNDS.length) {
      $("r-score").textContent = score;
      $("r-comment").textContent = PL.t(score >= 10 ? "res.c1" : score >= 7 ? "res.c2" : "res.c3");
      show("result");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      renderRound(true);
    }
  }

  function start() {
    idx = 0; score = 0;
    show("game");
    renderRound(true);
  }

  $("btn-start").addEventListener("click", start);
  $("btn-again").addEventListener("click", function () {
    start();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  $("btn-next").addEventListener("click", next);

  PL.onLang(function () {
    if (state === "game" && !answered) renderRound(false);
    if (state === "result") {
      $("r-comment").textContent = PL.t(score >= 10 ? "res.c1" : score >= 7 ? "res.c2" : "res.c3");
    }
  });
})();
</script>
</body>
</html>
