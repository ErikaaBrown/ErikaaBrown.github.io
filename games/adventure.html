<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://psicolab-api.nightmareftw.workers.dev; base-uri 'self'; object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>A Grande Apresentação · PsicoLab</title>
<link rel="icon" type="image/png" href="../img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=11">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1><img src="../img/icon-adventure.png" alt=""> <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-intro" class="panel">
    <p data-i18n="intro.p1"></p>
    <p data-i18n="intro.p2"></p>
    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>
    </div>
  </section>

  <section id="panel-game" class="panel hidden">
    <div class="meter" style="margin-bottom:18px">
      <span data-i18n="meter.label"></span>
      <div class="track"><div class="fill" id="stress-fill"></div></div>
      <span id="stress-val"></span>
    </div>
    <p class="small" id="day-label" style="font-weight:800;color:var(--brand-ink);text-transform:uppercase;letter-spacing:0.05em"></p>
    <p class="story-text" id="story"></p>
    <div class="opt-list" id="choices" style="margin-top:20px"></div>
  </section>

  <section id="panel-end" class="hidden">
    <div class="panel">
      <h2 style="margin-top:0" id="end-title"></h2>
      <p class="story-text" id="end-text" style="margin:0 0 18px"></p>
      <div class="meter">
        <span data-i18n="meter.final"></span>
        <div class="track"><div class="fill" id="end-fill"></div></div>
        <span id="end-val"></span>
      </div>
    </div>
    <div class="panel">
      <h3 style="margin-top:0" data-i18n="prof.title"></h3>
      <div id="prof-bars"></div>
      <div class="interp" id="prof-main"></div>
      <p class="small muted" data-i18n="prof.note" style="margin-top:14px"></p>
    </div>
    <div class="center mt-2">
      <button class="btn" id="btn-again" data-i18n="btn.again"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
window.PAGE = {
  root: "../",
  section: "games",
  i18n: {
    pt: {
      "page.title": "A Grande Apresentação",
      "crumb": "Jogos",
      "intro.lead": "Uma história interactiva sobre uma semana difícil, e sobre as estratégias que usamos para lidar com o stress.",
      "intro.p1": "Sexta-feira de manhã apresentas o teu projecto à direcção. Tens cinco dias. Cada escolha que fizeres afecta o teu nível de stress, e revela o teu estilo de coping.",
      "intro.p2": "Não há escolhas «certas»: há estratégias com custos e benefícios diferentes. No fim, vais ver o teu perfil.",
      "btn.start": "Começar a semana",
      "btn.again": "Reviver a semana",
      "meter.label": "Stress",
      "meter.final": "Stress final",
      "prof.title": "O teu perfil de coping nesta semana",
      "prof.note": "💡 Nenhuma estratégia é sempre a melhor: a investigação mostra que a flexibilidade (escolher a estratégia conforme a situação) é o que melhor prevê a adaptação. O evitamento é a única que sai quase sempre cara: alivia já, mas cobra juros.",
      "cop.problem": "Resolução de problemas",
      "cop.emotion": "Regulação emocional",
      "cop.support": "Procura de apoio",
      "cop.avoid": "Evitamento",
      "d.problem": "Atacas a causa do stress: planeias, divides, negoceias. É a estratégia mais eficaz quando a situação está sob o teu controlo.",
      "d.emotion": "Geres a tua resposta interna: respiração, reavaliação, pausas. É a estratégia certa quando a causa não pode ser mudada já.",
      "d.support": "Usas as outras pessoas: desabafar, pedir feedback, negociar companhia. O apoio social multiplica todas as outras estratégias.",
      "d.avoid": "Adias e distrais-te. Alívio imediato garantido, mas o stress fica a acumular juros e volta maior. Vale a pena treinar alternativas."
    },
    en: {
      "page.title": "The Big Presentation",
      "crumb": "Games",
      "intro.lead": "An interactive story about a hard week, and the strategies we use to cope with stress.",
      "intro.p1": "On Friday morning you present your project to the board. You have five days. Every choice you make affects your stress level, and reveals your coping style.",
      "intro.p2": "There are no \"right\" choices: there are strategies with different costs and benefits. At the end, you will see your profile.",
      "btn.start": "Start the week",
      "btn.again": "Relive the week",
      "meter.label": "Stress",
      "meter.final": "Final stress",
      "prof.title": "Your coping profile this week",
      "prof.note": "💡 No strategy is always best: research shows that flexibility (matching the strategy to the situation) is what best predicts adaptation. Avoidance is the only one that almost always costs extra: it relieves now, but charges interest.",
      "cop.problem": "Problem-solving",
      "cop.emotion": "Emotion regulation",
      "cop.support": "Seeking support",
      "cop.avoid": "Avoidance",
      "d.problem": "You attack the cause of stress: you plan, break things down, negotiate. The most effective strategy when the situation is under your control.",
      "d.emotion": "You manage your internal response: breathing, reappraisal, breaks. The right strategy when the cause cannot be changed right now.",
      "d.support": "You use other people: venting, asking for feedback, negotiating company. Social support multiplies every other strategy.",
      "d.avoid": "You postpone and distract yourself. Instant relief guaranteed, but the stress accrues interest and comes back bigger. Worth training alternatives."
    }
  }
};
</script>
<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var NODES = [
    { day: { pt: "Domingo à noite", en: "Sunday night" },
      text: { pt: "Sexta-feira às 10h apresentas o projecto à direcção. É a primeira vez que falas para a sala grande, e o estômago dá um nó só de pensar nisso.",
              en: "Friday at 10 a.m. you present the project to the board. It is the first time you speak to the big room, and your stomach knots just thinking about it." },
      choices: [
        { tag: "problem", d: -6, t: { pt: "Abrir o portátil e fazer um plano de preparação para a semana", en: "Open the laptop and make a preparation plan for the week" } },
        { tag: "avoid", d: 7, t: { pt: "«Ainda falta imenso.» Maratona de séries até às 2h da manhã", en: "\"There's still plenty of time.\" Binge-watch shows until 2 a.m." } },
        { tag: "support", d: -3, t: { pt: "Ligar a um amigo e desabafar sobre o nervosismo", en: "Call a friend and vent about the nerves" } }
      ] },
    { day: { pt: "Segunda-feira", en: "Monday" },
      text: { pt: "Um colega pede-te ajuda com um relatório «urgente» que te vai comer a tarde toda, exactamente quando planeavas começar os slides.",
              en: "A colleague asks for help with an \"urgent\" report that will eat your whole afternoon, exactly when you planned to start the slides." },
      choices: [
        { tag: "problem", d: -4, t: { pt: "Dizer que não com clareza: esta semana é crítica para ti", en: "Say no clearly: this week is critical for you" } },
        { tag: "avoid", d: 8, t: { pt: "Aceitar. Detestas conflitos. Depois recuperas o tempo... algures", en: "Accept. You hate conflict. You'll make up the time... somewhere" } },
        { tag: "support", d: -2, t: { pt: "Propor fazerem o relatório juntos amanhã, depois de adiantares os slides", en: "Propose doing the report together tomorrow, after you get ahead on the slides" } }
      ] },
    { day: { pt: "Terça-feira", en: "Tuesday" },
      text: { pt: "Os slides não saem. Há duas horas que olhas para o mesmo diapositivo, e cada nova versão parece pior do que a anterior.",
              en: "The slides will not come. You have been staring at the same one for two hours, and every new version looks worse than the last." },
      choices: [
        { tag: "problem", d: -6, t: { pt: "Dividir a apresentação em partes pequenas e atacar só a primeira", en: "Break the presentation into small parts and attack only the first" } },
        { tag: "emotion", d: -5, t: { pt: "Sair para caminhar 20 minutos e voltar de cabeça fresca", en: "Go for a 20-minute walk and come back with a fresh head" } },
        { tag: "problem", d: 8, t: { pt: "Ficar até às 3h da manhã: sem sono, mas os slides ficam feitos", en: "Stay up until 3 a.m.: no sleep, but the slides get done" } }
      ] },
    { day: { pt: "Quarta-feira", en: "Wednesday" },
      text: { pt: "A meio de uma reunião, a tua cabeça dispara: «Vou gaguejar. Vão perceber todos que não sei nada. Vai ser humilhante.»",
              en: "In the middle of a meeting, your mind races: \"I'll stutter. Everyone will see I know nothing. It will be humiliating.\"" },
      choices: [
        { tag: "emotion", d: -7, t: { pt: "Examinar o pensamento: que provas há? Já apresentaste antes e correu bem", en: "Examine the thought: what is the evidence? You have presented before and it went fine" } },
        { tag: "avoid", d: 6, t: { pt: "Empurrar o pensamento para longe e passar o resto do dia no telemóvel", en: "Push the thought away and spend the rest of the day on your phone" } },
        { tag: "support", d: -5, t: { pt: "Pedir a uma colega para assistir a um ensaio e dar feedback sincero", en: "Ask a colleague to watch a rehearsal and give honest feedback" } }
      ] },
    { day: { pt: "Quinta-feira", en: "Thursday" },
      text: { pt: "Véspera. O grupo combina um jantar «para descontrair». Sabes perfeitamente que estas coisas acabam sempre às tantas da noite.",
              en: "The eve. Your group plans a dinner \"to unwind\". You know perfectly well these things always end in the small hours." },
      choices: [
        { tag: "problem", d: -6, t: { pt: "Recusar com pena: ensaias uma vez em voz alta e deitas-te cedo", en: "Decline with regret: rehearse once out loud and go to bed early" } },
        { tag: "avoid", d: 7, t: { pt: "Ir. Voltas à meia-noite e meia com a cabeça pesada", en: "Go. You get back at half past midnight with a heavy head" } },
        { tag: "support", d: -2, t: { pt: "Ir só ao início: jantas, sais às 21h30 e ainda ensaias uma vez", en: "Go only for the start: dinner, leave at 9:30 p.m., still rehearse once" } }
      ] },
    { day: { pt: "Sexta-feira, 9h50", en: "Friday, 9:50 a.m." },
      text: { pt: "Dez minutos para começar. O coração bate depressa, as mãos suam, e a porta da sala grande está mesmo ali.",
              en: "Ten minutes to go. Your heart is racing, your hands are sweating, and the door to the big room is right there." },
      choices: [
        { tag: "emotion", d: -8, t: { pt: "Respirar 4-7-8 e reinterpretar: «Isto não é pânico; é energia para actuar»", en: "Breathe 4-7-8 and reappraise: \"This is not panic; it is energy to perform\"" } },
        { tag: "avoid", d: 6, t: { pt: "Café duplo, entrar de rompante e despachar isto de uma vez", en: "Double espresso, barge in and get it over with" } },
        { tag: "problem", d: 2, t: { pt: "Reler as notas obsessivamente até ao último segundo", en: "Re-read your notes obsessively until the last second" } }
      ] }
  ];

  var ENDINGS = [
    { max: 39, emoji: "🌟",
      title: { pt: "A sala é tua", en: "The room is yours" },
      text: { pt: "Entras com o corpo activado mas a cabeça no lugar. A voz sai firme, as pausas caem onde devem, e quando chega a pergunta difícil respondes com calma. No fim, o director acena lentamente que sim. Chegaste preparado, e sentiu-se.",
              en: "You walk in with your body activated but your head in place. Your voice comes out steady, the pauses land where they should, and when the hard question comes you answer calmly. At the end, the director slowly nods. You arrived prepared, and it showed." } },
    { max: 62, emoji: "💪",
      title: { pt: "Tempestade domada", en: "Storm tamed" },
      text: { pt: "Começas tenso e tropeças nas primeiras frases. Mas a preparação que fizeste segura-te: encontras o ritmo, a sala relaxa contigo, e o alívio no fim é genuíno. Correu suficientemente bem, e para uma primeira vez na sala grande, isso é muito.",
              en: "You start tense and stumble over the first sentences. But your preparation holds you: you find the rhythm, the room relaxes with you, and the relief at the end is genuine. It went well enough, and for a first time in the big room, that is a lot." } },
    { max: 100, emoji: "🌧️",
      title: { pt: "Por um triz", en: "By a whisker" },
      text: { pt: "Sobrevives. As mãos tremeram, saltaste dois slides e a sala pareceu um túnel. A semana de decisões adiadas apresentou a conta toda de uma vez. Mas acabou, e a boa notícia é que o coping se treina: repete a semana e experimenta escolhas diferentes.",
              en: "You survive. Your hands shook, you skipped two slides and the room felt like a tunnel. A week of postponed decisions presented its bill all at once. But it is over, and the good news is that coping is trainable: replay the week and try different choices." } }
  ];

  var $ = function (id) { return document.getElementById(id); };
  var stress = 45;
  var nodeIdx = 0;
  var tags = { problem: 0, emotion: 0, support: 0, avoid: 0 };
  var state = "intro";

  function show(p) {
    $("panel-intro").classList.toggle("hidden", p !== "intro");
    $("panel-game").classList.toggle("hidden", p !== "game");
    $("panel-end").classList.toggle("hidden", p !== "end");
    state = p;
  }

  function stressColor(v) {
    return v < 40 ? "var(--good)" : v <= 62 ? "var(--warn)" : "var(--critical)";
  }

  function renderMeter() {
    $("stress-fill").style.width = stress + "%";
    $("stress-fill").style.background = stressColor(stress);
    $("stress-val").textContent = stress;
  }

  function renderNode() {
    var n = NODES[nodeIdx];
    renderMeter();
    $("day-label").textContent = n.day[PL.lang];
    $("story").textContent = n.text[PL.lang];
    var box = $("choices");
    box.innerHTML = "";
    n.choices.forEach(function (c) {
      var b = document.createElement("button");
      b.className = "opt-btn";
      b.textContent = c.t[PL.lang];
      b.addEventListener("click", function () { pick(c); });
      box.appendChild(b);
    });
  }

  function pick(c) {
    stress = Math.max(5, Math.min(95, stress + c.d));
    tags[c.tag]++;
    nodeIdx++;
    if (nodeIdx >= NODES.length) renderEnd(); else renderNode();
  }

  function renderEnd() {
    show("end");
    var e = ENDINGS[0];
    for (var i = 0; i < ENDINGS.length; i++) {
      if (stress <= ENDINGS[i].max) { e = ENDINGS[i]; break; }
    }
    $("end-title").textContent = e.emoji + " " + e.title[PL.lang];
    $("end-text").textContent = e.text[PL.lang];
    $("end-fill").style.width = stress + "%";
    $("end-fill").style.background = stressColor(stress);
    $("end-val").textContent = stress;

    var order = ["problem", "emotion", "support", "avoid"];
    var maxTag = order[0];
    order.forEach(function (k) { if (tags[k] > tags[maxTag]) maxTag = k; });
    var bars = "";
    order.forEach(function (k) {
      var pct = tags[k] / NODES.length * 100;
      bars += "<div class='rbar'><div class='rbar-head'><span>" + PL.t("cop." + k) + "</span><span class='val'>" + tags[k] + "×</span></div>" +
        "<div class='track'><div class='fill' style='width:" + pct + "%" + (k === "avoid" ? ";background:var(--serious)" : "") + "'></div></div></div>";
    });
    $("prof-bars").innerHTML = bars;
    $("prof-main").innerHTML = "<h3>" + PL.t("cop." + maxTag) + "</h3><p>" + PL.t("d." + maxTag) + "</p>";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function start() {
    stress = 45;
    nodeIdx = 0;
    tags = { problem: 0, emotion: 0, support: 0, avoid: 0 };
    show("game");
    renderNode();
  }

  $("btn-start").addEventListener("click", start);
  $("btn-again").addEventListener("click", function () {
    start();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  PL.onLang(function () {
    if (state === "game") renderNode();
    if (state === "end") renderEnd();
  });
})();
</script>
</body>
</html>
