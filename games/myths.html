<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://psicolab-api.nightmareftw.workers.dev; base-uri 'self'; object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Mito ou Facto? · PsicoLab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1>🧨 <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-intro" class="panel">
    <p data-i18n="intro.p1"></p>
    <p class="small muted" id="best-line"></p>
    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>
    </div>
  </section>

  <section id="panel-game" class="panel hidden">
    <div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <p class="small muted" id="qcount"></p>
    <div class="scenario-box" id="statement" style="max-width:none;font-size:1.15rem;margin-bottom:18px"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-ghost" id="btn-myth" style="min-width:140px"></button>
      <button class="btn" id="btn-fact" style="min-width:140px"></button>
    </div>
    <div id="feedback" class="hidden" style="margin-top:18px">
      <div class="notice" id="feedback-text"></div>
      <div class="center">
        <button class="btn btn-sm" id="btn-next" data-i18n="btn.next"></button>
      </div>
    </div>
  </section>

  <section id="panel-result" class="hidden">
    <div class="panel center">
      <h2 style="margin-top:0" data-i18n="res.title"></h2>
      <div class="tiles" style="max-width:340px;margin:1rem auto">
        <div class="tile"><div class="num" id="r-score"></div><div class="lbl" data-i18n="res.score"></div></div>
        <div class="tile"><div class="num" id="r-best"></div><div class="lbl" data-i18n="res.best"></div></div>
      </div>
      <p id="r-comment" class="muted" style="max-width:520px;margin:0 auto"></p>
    </div>
    <div class="panel panel-soft">
      <p style="margin:0" data-i18n="res.expl"></p>
    </div>
    <div class="center mt-2">
      <button class="btn" id="btn-again" data-i18n="btn.again"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
window.PAGE = {
  root: "../",
  section: "games",
  i18n: {
    pt: {
      "page.title": "Mito ou Facto?",
      "crumb": "Jogos",
      "intro.lead": "A psicologia popular está cheia de «verdades» que a ciência nunca confirmou. Consegues separar o trigo do joio?",
      "intro.p1": "Vais ler 12 afirmações sobre a mente e o cérebro. Para cada uma, decide: é um mito ou um facto? No fim de cada resposta explicamos o que diz a investigação.",
      "best.prefix": "O teu recorde: ",
      "btn.start": "Começar",
      "btn.next": "Seguinte →",
      "btn.again": "Jogar outra vez",
      "btn.myth": "🧨 Mito",
      "btn.fact": "✅ Facto",
      "fb.right": "✔️ Certo! ",
      "fb.wrong.myth": "✖️ É um mito. ",
      "fb.wrong.fact": "✖️ É mesmo um facto. ",
      "res.title": "Resultado",
      "res.score": "em 12",
      "res.best": "Recorde",
      "res.c1": "Imune à psicologia de revista! Excelente literacia científica.",
      "res.c2": "Bom olho crítico. Os mitos que te apanharam são dos mais persistentes que existem.",
      "res.c3": "Estes mitos sobrevivem há décadas precisamente porque parecem plausíveis. Agora já conheces os principais.",
      "res.expl": "🧠 Porque é que os mitos persistem? Porque são simples, intuitivos e úteis para contar histórias. E desmenti-los tem um efeito perverso: repetir o mito para o corrigir às vezes reforça-o na memória. A melhor defesa é a que treinaste aqui: perguntar «que provas existem?» antes de partilhar.",
      "new.record": "Novo recorde! 🏆"
    },
    en: {
      "page.title": "Myth or Fact?",
      "crumb": "Games",
      "intro.lead": "Pop psychology is full of \"truths\" that science never confirmed. Can you tell them apart?",
      "intro.p1": "You will read 12 statements about the mind and brain. For each one, decide: myth or fact? After each answer we explain what the research says.",
      "best.prefix": "Your record: ",
      "btn.start": "Start",
      "btn.next": "Next →",
      "btn.again": "Play again",
      "btn.myth": "🧨 Myth",
      "btn.fact": "✅ Fact",
      "fb.right": "✔️ Correct! ",
      "fb.wrong.myth": "✖️ It is a myth. ",
      "fb.wrong.fact": "✖️ It really is a fact. ",
      "res.title": "Result",
      "res.score": "out of 12",
      "res.best": "Record",
      "res.c1": "Immune to magazine psychology! Excellent scientific literacy.",
      "res.c2": "A good critical eye. The myths that caught you are among the most persistent in existence.",
      "res.c3": "These myths have survived for decades precisely because they sound plausible. Now you know the main ones.",
      "res.expl": "🧠 Why do myths persist? Because they are simple, intuitive and useful for storytelling. And debunking has a perverse effect: repeating a myth in order to correct it sometimes reinforces it in memory. The best defence is the one you trained here: asking \"what is the evidence?\" before sharing.",
      "new.record": "New record! 🏆"
    }
  }
};
</script>
<script src="../js/app.js"></script>
<script>
(function () {
  var ITEMS = [
    { fact: false,
      s: { pt: "Usamos apenas 10% do cérebro.", en: "We only use 10% of our brain." },
      ex: { pt: "A imagiologia mostra actividade em praticamente todo o cérebro ao longo de um dia normal. Um órgão que gasta 20% da energia do corpo não guardaria 90% de peso morto.", en: "Imaging shows activity across practically the whole brain during a normal day. An organ that burns 20% of the body's energy would not keep 90% dead weight." } },
    { fact: true,
      s: { pt: "O cérebro consome cerca de 20% da energia do corpo.", en: "The brain consumes about 20% of the body's energy." },
      ex: { pt: "Com apenas 2% do peso corporal, o cérebro é o órgão mais caro que temos. É por isso que pensar cansa a sério.", en: "At only 2% of body weight, the brain is the most expensive organ we have. That is why thinking is genuinely tiring." } },
    { fact: false,
      s: { pt: "Há pessoas «do cérebro direito» (criativas) e «do cérebro esquerdo» (lógicas).", en: "Some people are \"right-brained\" (creative) and others \"left-brained\" (logical)." },
      ex: { pt: "Existem especializações reais entre hemisférios, mas qualquer tarefa complexa usa redes dos dois lados em cooperação constante. Ninguém «é» de um lado.", en: "Real specialisations exist between hemispheres, but any complex task uses networks on both sides in constant cooperation. Nobody \"is\" one side." } },
    { fact: false,
      s: { pt: "Cada pessoa aprende melhor no seu estilo: visual, auditivo ou cinestésico.", en: "Everyone learns best in their own style: visual, auditory or kinaesthetic." },
      ex: { pt: "As preferências existem, mas dezenas de estudos controlados mostram que ensinar «no estilo preferido» não melhora a aprendizagem. O que funciona: prática espaçada e testar-se.", en: "Preferences exist, but dozens of controlled studies show that teaching \"in the preferred style\" does not improve learning. What works: spaced practice and self-testing." } },
    { fact: true,
      s: { pt: "Uma noite sem dormir afecta o desempenho de forma comparável ao álcool.", en: "A night without sleep affects performance comparably to alcohol." },
      ex: { pt: "Ao fim de 17 a 19 horas acordado, o desempenho cognitivo equivale ao de uma alcoolemia de cerca de 0,05%. Conduzir com sono é conduzir alterado.", en: "After 17 to 19 hours awake, cognitive performance matches a blood alcohol level of about 0.05%. Driving sleepy is driving impaired." } },
    { fact: false,
      s: { pt: "Pôr os bebés a ouvir Mozart aumenta a inteligência.", en: "Playing Mozart to babies increases their intelligence." },
      ex: { pt: "O famoso «efeito Mozart» nunca se replicou em bebés. O estudo original era com adultos, o efeito era minúsculo e durava minutos.", en: "The famous \"Mozart effect\" never replicated in babies. The original study used adults, the effect was tiny and lasted minutes." } },
    { fact: false,
      s: { pt: "Descarregar a raiva num saco de boxe ajuda a libertá-la.", en: "Venting anger on a punching bag helps release it." },
      ex: { pt: "A investigação mostra o contrário: «descarregar» ensaia a raiva e tende a aumentá-la. O que a reduz: acalmar a activação e reavaliar a situação.", en: "Research shows the opposite: \"venting\" rehearses anger and tends to increase it. What reduces it: calming the arousal and reappraising the situation." } },
    { fact: true,
      s: { pt: "O exercício físico tem efeitos comprovados na depressão ligeira a moderada.", en: "Physical exercise has proven effects on mild to moderate depression." },
      ex: { pt: "Dezenas de ensaios clínicos mostram efeitos comparáveis aos de tratamentos de primeira linha em casos ligeiros a moderados. Não substitui acompanhamento, mas soma.", en: "Dozens of clinical trials show effects comparable to first-line treatments for mild to moderate cases. It does not replace care, but it adds to it." } },
    { fact: false,
      s: { pt: "Os detectores de mentiras identificam mentiras com fiabilidade.", en: "Lie detectors identify lies reliably." },
      ex: { pt: "O polígrafo mede activação fisiológica (suor, ritmo cardíaco), não mentiras. Pessoas calmas enganam-no; pessoas nervosas e honestas acusam falso positivo.", en: "The polygraph measures physiological arousal (sweat, heart rate), not lies. Calm liars beat it; nervous honest people trigger false positives." } },
    { fact: true,
      s: { pt: "As memórias mudam um pouco de cada vez que as recordamos.", en: "Memories change a little every time we recall them." },
      ex: { pt: "Recordar é reconstruir: a memória reactivada volta a gravar-se, incorporando o contexto do momento. É a base científica das memórias falsas.", en: "Remembering is reconstructing: a reactivated memory is stored again, absorbing the context of the moment. This is the scientific basis of false memories." } },
    { fact: false,
      s: { pt: "O açúcar torna as crianças hiperactivas.", en: "Sugar makes children hyperactive." },
      ex: { pt: "Meta-análises de estudos duplamente cegos não encontram o efeito. O que muda é a expectativa dos pais, que vêem agitação onde esperam vê-la.", en: "Meta-analyses of double-blind studies find no effect. What changes is parents' expectation, seeing restlessness where they expect it." } },
    { fact: false,
      s: { pt: "Nas relações amorosas, os opostos atraem-se.", en: "In romantic relationships, opposites attract." },
      ex: { pt: "A investigação diz consistentemente o contrário: a semelhança (de valores, interesses e personalidade) é dos melhores preditores de atracção e de estabilidade.", en: "Research consistently says the opposite: similarity (in values, interests and personality) is one of the best predictors of attraction and stability." } }
  ];

  var $ = function (id) { return document.getElementById(id); };
  var idx = 0, score = 0, state = "intro", answered = false;

  function scores() { return PL.load("scores", {}); }

  function show(p) {
    $("panel-intro").classList.toggle("hidden", p !== "intro");
    $("panel-game").classList.toggle("hidden", p !== "game");
    $("panel-result").classList.toggle("hidden", p !== "result");
    state = p;
  }

  function bestLine() {
    var b = scores().myths || 0;
    $("best-line").textContent = b ? PL.t("best.prefix") + b + "/12" : "";
  }

  function renderRound() {
    var it = ITEMS[idx];
    answered = false;
    $("qcount").textContent = (idx + 1) + " / " + ITEMS.length;
    $("pfill").style.width = (idx / ITEMS.length * 100) + "%";
    $("feedback").classList.add("hidden");
    $("statement").textContent = "«" + it.s[PL.lang] + "»";
    $("btn-myth").textContent = PL.t("btn.myth");
    $("btn-fact").textContent = PL.t("btn.fact");
    $("btn-myth").disabled = false;
    $("btn-fact").disabled = false;
  }

  function pick(saysFact) {
    if (answered) return;
    answered = true;
    var it = ITEMS[idx];
    var right = saysFact === it.fact;
    if (right) score++;
    $("btn-myth").disabled = true;
    $("btn-fact").disabled = true;
    var prefix = right ? PL.t("fb.right") : PL.t(it.fact ? "fb.wrong.fact" : "fb.wrong.myth");
    $("feedback-text").textContent = prefix + it.ex[PL.lang];
    $("feedback").classList.remove("hidden");
  }

  function next() {
    idx++;
    if (idx >= ITEMS.length) {
      var sc = scores();
      var isRecord = score > (sc.myths || 0);
      if (isRecord) {
        sc.myths = score;
        PL.store("scores", sc);
      }
      renderResult(isRecord);
      show("result");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      renderRound();
    }
  }

  function renderResult(isRecord) {
    $("r-score").textContent = score;
    $("r-best").textContent = (scores().myths || score) + "/12";
    var c = score >= 11 ? "res.c1" : score >= 8 ? "res.c2" : "res.c3";
    $("r-comment").textContent = (isRecord ? PL.t("new.record") + " " : "") + PL.t(c);
  }

  function start() {
    idx = 0; score = 0;
    show("game");
    renderRound();
  }

  $("btn-start").addEventListener("click", start);
  $("btn-again").addEventListener("click", function () {
    start();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  $("btn-myth").addEventListener("click", function () { pick(false); });
  $("btn-fact").addEventListener("click", function () { pick(true); });
  $("btn-next").addEventListener("click", next);

  document.addEventListener("pl:ready", bestLine);
  PL.onLang(function () {
    bestLine();
    if (state === "game" && !answered) renderRound();
    if (state === "result") renderResult(false);
  });
})();
</script>
</body>
</html>
