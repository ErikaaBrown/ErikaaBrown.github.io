<script src="../js/app.js?v=5"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var TRIALS = 5;
  var state = "idle"; // idle | waiting | go | early | between | done
  var results = [];
  var goAt = 0;
  var waitTimer = null;
  var lastMs = 0;

  function setZone(text, bg) {
    var z = $("zone");
    z.textContent = text;
    z.style.background = bg;
  }

  function info() {
    $("trial-info").textContent = state === "done" ? "" :
      PL.t("trial.info") + Math.min(results.length + 1, TRIALS) + " / " + TRIALS;
  }

  function idle() {
    state = "idle";
    results = [];
    $("panel-result").classList.add("hidden");
    setZone(PL.t("zone.idle"), "var(--brand)");
    info();
  }

  function armWait() {
    state = "waiting";
    setZone(PL.t("zone.wait"), "var(--critical)");
    info();
    clearTimeout(waitTimer);
    waitTimer = setTimeout(function () {
      state = "go";
      goAt = performance.now();
      setZone(PL.t("zone.go"), "var(--good)");
    }, 1200 + Math.random() * 2800);
  }

  function finish() {
    state = "done";
    info();
    var avg = Math.round(results.reduce(function (a, b) { return a + b; }, 0) / results.length);
    var best = Math.min.apply(null, results);
    $("r-avg").textContent = avg + " ms";
    $("r-best").textContent = best + " ms";
    $("trials-list").innerHTML = results.map(function (r) {
      return "<span class='chip'>" + r + " ms</span>";
    }).join("");
    var refs = "";
    ["ref.1", "ref.2", "ref.3", "ref.4"].forEach(function (k) {
      var r = PL.t(k);
      refs += "<tr><td style='font-weight:800;white-space:nowrap'>" + r[0] + "</td><td>" + r[1] + "</td></tr>";
    });
    $("ref-table").innerHTML = refs;
    $("panel-result").classList.remove("hidden");
    setZone(avg + " ms", "var(--brand)");
  }

  $("zone").addEventListener("click", function () {
    if (state === "idle" || state === "early") {
      armWait();
    } else if (state === "waiting") {
      clearTimeout(waitTimer);
      state = "early";
      setZone(PL.t("zone.early"), "var(--warn)");
    } else if (state === "go") {
      lastMs = Math.round(performance.now() - goAt);
      results.push(lastMs);
      if (results.length >= TRIALS) {
        finish();
      } else {
        state = "between";
        setZone(lastMs + PL.t("zone.next"), "var(--accent)");
        info();
      }
    } else if (state === "between") {
      armWait();
    } else if (state === "done") {
      idle();
      armWait();
    }
  });

  $("btn-again").addEventListener("click", function () {
    idle();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  document.addEventListener("pl:ready", idle);
  PL.onLang(function () {
    if (state === "idle") setZone(PL.t("zone.idle"), "var(--brand)");
    if (state === "waiting") setZone(PL.t("zone.wait"), "var(--critical)");
    if (state === "early") setZone(PL.t("zone.early"), "var(--warn)");
    if (state === "between") setZone(lastMs + PL.t("zone.next"), "var(--accent)");
    if (state === "done") finish();
    info();
  });
})();
</script>
</body>
