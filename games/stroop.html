<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://psicolab-api.nightmareftw.workers.dev; base-uri 'self'; object-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Teste de Stroop · PsicoLab</title>
<link rel="icon" type="image/png" href="../img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=13">
</head>
<body>
<div id="site-header"></div>

<main class="container narrow">
  <div class="page-hero">
    <span class="crumb" data-i18n="crumb"></span>
    <h1><img src="../img/icon-stroop.png" alt=""> <span data-i18n="page.title"></span></h1>
    <p data-i18n="intro.lead"></p>
  </div>

  <section id="panel-intro" class="panel">
    <p data-i18n="intro.p1"></p>
    <p data-i18n="intro.p2"></p>
    <div class="center mt-2">
      <button class="btn" id="btn-start" data-i18n="btn.start"></button>
    </div>
  </section>

  <section id="panel-game" class="panel hidden">
    <div style="display:flex;justify-content:space-between;font-weight:800">
      <span id="hud-time"></span>
      <span id="hud-score"></span>
    </div>
    <div class="game-stage">
      <div class="stroop-word" id="word"></div>
      <div class="color-btns" id="btns"></div>
      <p class="small muted" data-i18n="game.hint"></p>
    </div>
  </section>

  <section id="panel-result" class="hidden">
    <div class="panel">
      <h2 style="margin-top:0" data-i18n="res.title"></h2>
      <div class="tiles">
        <div class="tile"><div class="num" id="r-score">0</div><div class="lbl" data-i18n="res.score"></div></div>
        <div class="tile"><div class="num" id="r-acc">0%</div><div class="lbl" data-i18n="res.acc"></div></div>
        <div class="tile"><div class="num" id="r-cong">...</div><div class="lbl" data-i18n="res.cong"></div></div>
        <div class="tile"><div class="num" id="r-incong">...</div><div class="lbl" data-i18n="res.incong"></div></div>
      </div>
      <p id="interference-line" style="font-weight:700"></p>
    </div>
    <div class="panel panel-soft">
      <p style="margin:0" data-i18n="res.expl"></p>
    </div>
    <div class="center mt-2">
      <button class="btn" id="btn-again" data-i18n="btn.again"></button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script>
window.PAGE = {
  root: "../",
  section: "games",
  i18n: {
    pt: {
      "page.title": "Teste de Stroop",
      "crumb": "Jogos",
      "intro.lead": "Um dos efeitos mais replicados da psicologia experimental, descrito por John Ridley Stroop em 1935.",
      "intro.p1": "Vais ver palavras de cores escritas com tintas de cor diferente. A tua missão: indicar a cor da tinta, ignorando o que a palavra diz. Quando a palavra «AZUL» aparece pintada de verde, a resposta certa é... verde.",
      "intro.p2": "Tens 45 segundos para acertar no máximo de palavras. Podes usar o rato ou as teclas 1-4.",
      "btn.start": "Começar (45 s)",
      "btn.again": "Jogar outra vez",
      "game.hint": "Responde à COR DA TINTA, não à palavra. Teclas 1-4 também funcionam.",
      "hud.time": "⏱️ ", "hud.score": "✔️ ",
      "res.title": "Resultado",
      "res.score": "Acertos",
      "res.acc": "Precisão",
      "res.cong": "RT congruente",
      "res.incong": "RT incongruente",
      "res.interf": "Interferência (efeito de Stroop): ",
      "res.interf.na": "Joga mais uma ronda para medir a interferência com fiabilidade.",
      "res.expl": "🧠 O que se passa: ler é um processo automático; não consegues «desligá-lo». Quando a palavra e a tinta não coincidem, o cérebro tem de suprimir a leitura automática para responder à cor, e isso custa tempo. Essa diferença de milissegundos é o efeito de Stroop, usado há 90 anos para estudar atenção e controlo inibitório."
    },
    en: {
      "page.title": "Stroop Test",
      "crumb": "Games",
      "intro.lead": "One of the most replicated effects in experimental psychology, described by John Ridley Stroop in 1935.",
      "intro.p1": "You will see colour words written in inks of a different colour. Your mission: name the ink colour, ignoring what the word says. When the word \"BLUE\" appears painted green, the right answer is... green.",
      "intro.p2": "You have 45 seconds to get as many as you can. Use the mouse or keys 1-4.",
      "btn.start": "Start (45 s)",
      "btn.again": "Play again",
      "game.hint": "Answer the INK COLOUR, not the word. Keys 1-4 also work.",
      "hud.time": "⏱️ ", "hud.score": "✔️ ",
      "res.title": "Result",
      "res.score": "Correct",
      "res.acc": "Accuracy",
      "res.cong": "Congruent RT",
      "res.incong": "Incongruent RT",
      "res.interf": "Interference (Stroop effect): ",
      "res.interf.na": "Play another round to measure interference reliably.",
      "res.expl": "🧠 What is going on: reading is automatic; you cannot \"switch it off\". When the word and the ink do not match, your brain has to suppress the automatic reading to answer the colour, and that costs time. That millisecond difference is the Stroop effect, used for 90 years to study attention and inhibitory control."
    }
  }
};
</script>
<script src="../js/app.js?v=5"></script>
<script>
(function () {
  var COLORS = [
    { pt: "VERMELHO", en: "RED", css: "#d9403f" },
    { pt: "AZUL", en: "BLUE", css: "var(--chart-2)" },
    { pt: "VERDE", en: "GREEN", css: "var(--chart-1)" },
    { pt: "AMARELO", en: "YELLOW", css: "#e09b00" }
  ];

  var $ = function (id) { return document.getElementById(id); };
  var state = "intro";
  var timeLeft = 45, score = 0, total = 0;
  var inkIdx = -1, congruent = false, shownAt = 0;
  var rts = { cong: [], incong: [] };
  var timer = null;

  function show(p) {
    $("panel-intro").classList.toggle("hidden", p !== "intro");
    $("panel-game").classList.toggle("hidden", p !== "game");
    $("panel-result").classList.toggle("hidden", p !== "result");
    state = p;
  }

  function hud() {
    $("hud-time").textContent = PL.t("hud.time") + timeLeft + " s";
    $("hud-score").textContent = PL.t("hud.score") + score;
  }

  function nextTrial() {
    var wordIdx = Math.floor(Math.random() * 4);
    congruent = Math.random() < 0.5;
    if (congruent) {
      inkIdx = wordIdx;
    } else {
      do { inkIdx = Math.floor(Math.random() * 4); } while (inkIdx === wordIdx);
    }
    var w = $("word");
    w.textContent = COLORS[wordIdx][PL.lang];
    w.style.color = COLORS[inkIdx].css;
    shownAt = performance.now();
  }

  function answer(i) {
    if (state !== "game") return;
    total++;
    var rt = performance.now() - shownAt;
    if (i === inkIdx) {
      score++;
      (congruent ? rts.cong : rts.incong).push(rt);
      $("panel-game").classList.remove("flash-bad");
      $("panel-game").classList.remove("flash-ok");
      void $("panel-game").offsetWidth;
      $("panel-game").classList.add("flash-ok");
    } else {
      $("panel-game").classList.remove("flash-ok");
      $("panel-game").classList.remove("flash-bad");
      void $("panel-game").offsetWidth;
      $("panel-game").classList.add("flash-bad");
    }
    hud();
    nextTrial();
  }

  function renderButtons() {
    var c = $("btns");
    c.innerHTML = "";
    COLORS.forEach(function (col, i) {
      var b = document.createElement("button");
      b.className = "opt-btn";
      b.textContent = (i + 1) + " · " + col[PL.lang];
      b.addEventListener("click", function () { answer(i); });
      c.appendChild(b);
    });
  }

  function avg(a) {
    if (!a.length) return null;
    return Math.round(a.reduce(function (x, y) { return x + y; }, 0) / a.length);
  }

  function finish() {
    clearInterval(timer);
    renderResult();
    show("result");
  }

  function renderResult() {
    $("r-score").textContent = score;
    $("r-acc").textContent = total ? Math.round(score / total * 100) + "%" : "...";
    var c = avg(rts.cong), ic = avg(rts.incong);
    $("r-cong").textContent = c !== null ? c + " ms" : "...";
    $("r-incong").textContent = ic !== null ? ic + " ms" : "...";
    if (c !== null && ic !== null && rts.cong.length >= 3 && rts.incong.length >= 3) {
      $("interference-line").textContent = PL.t("res.interf") + "+" + Math.max(0, ic - c) + " ms";
    } else {
      $("interference-line").textContent = PL.t("res.interf.na");
    }
  }

  function start() {
    timeLeft = 45; score = 0; total = 0;
    rts = { cong: [], incong: [] };
    show("game");
    renderButtons();
    hud();
    nextTrial();
    timer = setInterval(function () {
      timeLeft--;
      hud();
      if (timeLeft <= 0) finish();
    }, 1000);
  }

  document.addEventListener("keydown", function (e) {
    if (state !== "game") return;
    var n = parseInt(e.key, 10);
    if (n >= 1 && n <= 4) answer(n - 1);
  });

  $("btn-start").addEventListener("click", start);
  $("btn-again").addEventListener("click", start);

  PL.onLang(function () {
    if (state === "game") { renderButtons(); nextTrial(); hud(); }
    if (state === "result") renderResult();
  });
})();
</script>
</body>
</html>
