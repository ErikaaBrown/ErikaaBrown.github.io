    en: {
      "page.title": "Habit Tracker",
      "crumb": "Tools",
      "intro.lead": "Tick off your habits day by day. Watching the streak grow is, by itself, one of the strongest motivators there is.",
      "add.title": "New habit",

<script src="../js/app.js?v=2"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var habits = PL.load("habits", []);

  function isoDaysAgo(n) {
    var d = new Date();
    d.setDate(d.getDate() - n);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function streakOf(h) {
    var s = 0;
    for (var i = 0; ; i++) {
      if (h.c[isoDaysAgo(i)]) s++;
      else if (i === 0) continue;
      else break;
    }
    return s;
  }

  function render() {
    var grid = $("grid");
    $("empty-msg").classList.toggle("hidden", habits.length > 0);
    if (!habits.length) { grid.innerHTML = ""; return; }

    var days = [];
    for (var i = 6; i >= 0; i--) days.push(isoDaysAgo(i));
    var locale = PL.lang === "pt" ? "pt-PT" : "en-GB";

    var head = "<tr><th style='text-align:left'>" + PL.t("col.habit") + "</th>";
    days.forEach(function (iso) {
      var d = new Date(iso + "T12:00:00");
      var wd = d.toLocaleDateString(locale, { weekday: "short" }).replace(".", "");
      head += "<th>" + wd + "<br>" + d.getDate() + "</th>";
    });
    head += "<th>" + PL.t("col.streak") + "</th><th></th></tr>";

    var rows = "";
    habits.forEach(function (h, hi) {
      rows += "<tr><td class='habit-name'>" + h.e + " " + PL.esc(h.n) + "</td>";
      days.forEach(function (iso) {
        var on = h.c[iso] ? " on" : "";
        rows += "<td><button class='check-cell" + on + "' data-h='" + hi + "' data-iso='" + iso + "'>" + (h.c[iso] ? "✓" : "") + "</button></td>";
      });
      var st = streakOf(h);
      rows += "<td><span class='streak-flame'>" + (st > 0 ? "🔥 " + st : "—") + "</span></td>";
      rows += "<td><button class='del' data-del='" + hi + "' style='background:none;border:none;cursor:pointer;color:var(--ink-3)'>🗑️</button></td></tr>";
    });

    grid.innerHTML = head + rows;

    grid.querySelectorAll(".check-cell").forEach(function (b) {
      b.addEventListener("click", function () {
        var h = habits[parseInt(b.getAttribute("data-h"), 10)];
        var iso = b.getAttribute("data-iso");
        if (h.c[iso]) delete h.c[iso]; else h.c[iso] = 1;
        PL.store("habits", habits);
        render();
      });
    });
    grid.querySelectorAll("[data-del]").forEach(function (b) {
      b.addEventListener("click", function () {
        if (confirm(PL.t("del.confirm"))) {
          habits.splice(parseInt(b.getAttribute("data-del"), 10), 1);
          PL.store("habits", habits);
          render();
        }
      });
    });
  }

  $("btn-add").addEventListener("click", function () {
    var name = $("new-name").value.trim();
    if (!name) { PL.toast(PL.t("name.req")); return; }
    habits.push({ n: name, e: $("new-emoji").value, c: {} });
    PL.store("habits", habits);
    $("new-name").value = "";
    PL.toast(PL.t("added"));
    render();
  });
  $("new-name").addEventListener("keydown", function (e) {
    if (e.key === "Enter") $("btn-add").click();
  });

  document.addEventListener("pl:ready", render);
  PL.onLang(render);
})();
</script>
</body>
</html>
