<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var MIN_BUCKET = 5; // dias mínimos em cada grupo para mostrar uma comparação
  var MIN_MOOD_DAYS = 5; // dias mínimos de humor registado para mostrar seja o que for

  function isoDaysAgo(n) {
    var d = new Date();
    d.setDate(d.getDate() - n);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function last30() {
    var out = [];
    for (var i = 29; i >= 0; i--) out.push(isoDaysAgo(i));
    return out;
  }
  function avg(arr) { return arr.reduce(function (a, b) { return a + b; }, 0) / arr.length; }

  function habitDaySet(habits) {
    var set = {};
    habits.forEach(function (h) {
      Object.keys(h.c || {}).forEach(function (iso) { if (h.c[iso]) set[iso] = true; });
    });
    return set;
  }

  function renderConsistency(mood, habits, gratitude, sleep) {
    var days = last30();
    var habitSet = habitDaySet(habits);
    var cMood = days.filter(function (d) { return mood[d]; }).length;
    var cHabits = days.filter(function (d) { return habitSet[d]; }).length;
    var cGrat = days.filter(function (d) { return (gratitude[d] || []).some(Boolean); }).length;
    var cSleep = days.filter(function (d) { return sleep[d]; }).length;
    var tiles = [
      ["c.mood", cMood], ["c.habits", cHabits], ["c.gratitude", cGrat], ["c.sleep", cSleep]
    ];
    $("consistency-tiles").innerHTML = tiles.map(function (t) {
      return "<div class='tile'><div class='num'>" + t[1] + "</div><div class='lbl'>" + PL.t(t[0]) + "</div></div>";
    }).join("");
  }

  function comparison(mood, inGroup) {
    var withA = [], withoutB = [];
    Object.keys(mood).forEach(function (iso) {
      if (inGroup(iso)) withA.push(mood[iso].m); else withoutB.push(mood[iso].m);
    });
    if (withA.length < MIN_BUCKET || withoutB.length < MIN_BUCKET) return null;
    return { a: avg(withA), b: avg(withoutB) };
  }

  function sentenceKey(a, b) {
    var diff = a - b;
    if (diff > 0.25) return "up";
    if (diff < -0.25) return "down";
    return "flat";
  }

  function renderPatterns(mood, habits, gratitude, sleep) {
    var box = $("patterns-list");
    var tpl = $("tpl-pattern");
    box.innerHTML = "";

    var habitSet = habitDaySet(habits);
    var pHabits = comparison(mood, function (iso) { return !!habitSet[iso]; });

    var pGratitude = comparison(mood, function (iso) { return (gratitude[iso] || []).some(Boolean); });

    var pSleep = null;
    var goodMood = [], poorMood = [];
    Object.keys(mood).forEach(function (iso) {
      var s = sleep[iso];
      if (!s) return;
      if (s.q >= 4) goodMood.push(mood[iso].m);
      else if (s.q <= 2) poorMood.push(mood[iso].m);
    });
    if (goodMood.length >= MIN_BUCKET && poorMood.length >= MIN_BUCKET) {
      pSleep = { a: avg(goodMood), b: avg(poorMood) };
    }

    var cards = [
      { key: "habits", data: pHabits },
      { key: "gratitude", data: pGratitude },
      { key: "sleep", data: pSleep }
    ].filter(function (c) { return c.data; });

    if (!cards.length) {
      box.innerHTML = "<div class='panel panel-soft'><p style='margin:0' data-i18n='empty.p'>" + PL.t("empty.p") + "</p></div>";
      return;
    }

    cards.forEach(function (c) {
      var node = tpl.content.firstElementChild.cloneNode(true);
      node.querySelector(".pattern-title").textContent = PL.t("p." + c.key + ".title");
      node.querySelector(".pattern-num-a").textContent = c.data.a.toFixed(1);
      node.querySelector(".pattern-num-b").textContent = c.data.b.toFixed(1);
      node.querySelector(".pattern-lbl-a").textContent = PL.t("p." + c.key + ".a");
      node.querySelector(".pattern-lbl-b").textContent = PL.t("p." + c.key + ".b");
      var key = sentenceKey(c.data.a, c.data.b);
      node.querySelector(".pattern-sentence").textContent = PL.t("p." + c.key + ".sentence." + key)
        .replace("{a}", c.data.a.toFixed(1)).replace("{b}", c.data.b.toFixed(1));
      box.appendChild(node);
    });
  }

  function renderAll() {
    var mood = PL.load("mood", {});
    var habits = PL.load("habits", []);
    var gratitude = PL.load("gratitude", {});
    var sleep = PL.load("sleep", {});

    var moodDays = Object.keys(mood).length;
    if (moodDays < MIN_MOOD_DAYS) {
      $("panel-empty").classList.remove("hidden");
      $("panel-main").classList.add("hidden");
      return;
    }
    $("panel-empty").classList.add("hidden");
    $("panel-main").classList.remove("hidden");
    renderConsistency(mood, habits, gratitude, sleep);
    renderPatterns(mood, habits, gratitude, sleep);
  }

  document.addEventListener("pl:ready", renderAll);
  PL.onLang(renderAll);
})();
</script>
</body>
