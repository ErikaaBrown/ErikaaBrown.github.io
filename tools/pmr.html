<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var GROUPS = ["hands", "arms", "shoulders", "face", "neck", "chest", "abdomen", "legs", "feet"];
  var TENSE_S = 7, RELAX_S = 20;

  var $ = function (id) { return document.getElementById(id); };
  var running = false;
  var timer = null;
  var groupIdx = 0, phase = "tense", phaseLeft = TENSE_S;

  function setCircle(p, dur) {
    var c = $("circle");
    c.style.transition = "transform " + dur + "s cubic-bezier(0.4, 0, 0.4, 1)";
    c.style.transform = p === "tense" ? "scale(1)" : "scale(0.72)";
  }

  function startPhase() {
    phaseLeft = phase === "tense" ? TENSE_S : RELAX_S;
    $("phase-label").textContent = PL.t("phase." + phase);
    $("group-label").textContent = PL.t("group." + GROUPS[groupIdx]);
    $("phase-count").textContent = phaseLeft;
    $("group-count").textContent = (groupIdx + 1) + " / " + GROUPS.length + " " + PL.t("of.groups");
    setCircle(phase, phaseLeft);
  }

  function tick() {
    phaseLeft--;
    if (phaseLeft <= 0) {
      if (phase === "tense") {
        phase = "relax";
      } else {
        phase = "tense";
        groupIdx++;
        if (groupIdx >= GROUPS.length) { stop(true); return; }
      }
      startPhase();
    } else {
      $("phase-count").textContent = phaseLeft;
    }
  }

  function start() {
    running = true;
    groupIdx = 0;
    phase = "tense";
    $("btn-toggle").textContent = PL.t("btn.stop");
    startPhase();
    timer = setInterval(tick, 1000);
  }

  function stop(done) {
    running = false;
    clearInterval(timer);
    $("btn-toggle").textContent = PL.t("btn.start");
    $("phase-label").textContent = done ? PL.t("phase.done") : "";
    $("phase-count").textContent = "";
    $("group-label").textContent = "";
    $("group-count").textContent = "";
    var c = $("circle");
    c.style.transition = "transform 1.2s ease";
    c.style.transform = "scale(0.72)";
  }

  $("btn-toggle").addEventListener("click", function () {
    if (running) stop(false); else start();
  });

  function renderTips() {
    var html = "";
    ["tip.1", "tip.2", "tip.3", "tip.4"].forEach(function (k) {
      html += "<li style='margin:8px 0'>" + PL.t(k) + "</li>";
    });
    $("tips").innerHTML = html;
  }

  document.addEventListener("pl:ready", renderTips);
  PL.onLang(function () {
    renderTips();
    if (running) {
      $("phase-label").textContent = PL.t("phase." + phase);
      $("group-label").textContent = PL.t("group." + GROUPS[groupIdx]);
      $("btn-toggle").textContent = PL.t("btn.stop");
      $("group-count").textContent = (groupIdx + 1) + " / " + GROUPS.length + " " + PL.t("of.groups");
    }
  });
})();
</script>
</body>
