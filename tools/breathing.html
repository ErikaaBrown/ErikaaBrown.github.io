<script src="../js/app.js?v=3"></script>
<script>
(function () {
  var TECHNIQUES = {
    box: [{ p: "in", d: 4 }, { p: "hold", d: 4 }, { p: "out", d: 4 }, { p: "hold", d: 4 }],
    "478": [{ p: "in", d: 4 }, { p: "hold", d: 7 }, { p: "out", d: 8 }],
    coherent: [{ p: "in", d: 5 }, { p: "out", d: 5 }]
  };

  var $ = function (id) { return document.getElementById(id); };
  var running = false;
  var timer = null;
  var phaseIdx = 0, phaseLeft = 0, totalLeft = 0, cycles = 0;

  function tech() { return TECHNIQUES[$("technique").value]; }

  function updateDesc() {
    var key = $("technique").value === "478" ? "desc.478" : "desc." + $("technique").value;
    $("tech-desc").textContent = PL.t(key);
  }

  function setCircle(phase, dur) {
    var c = $("circle");
    c.style.transition = "transform " + dur + "s cubic-bezier(0.4, 0, 0.4, 1)";
    if (phase === "in") c.style.transform = "scale(1)";
    else if (phase === "out") c.style.transform = "scale(0.72)";
  }

  function startPhase() {
    var ph = tech()[phaseIdx];
    phaseLeft = ph.d;
    $("phase-label").textContent = PL.t("phase." + ph.p);
    $("phase-count").textContent = phaseLeft;
    setCircle(ph.p, ph.d);
  }

  function tick() {
    totalLeft--;
    phaseLeft--;
    if (phaseLeft <= 0) {
      phaseIdx++;
      if (phaseIdx >= tech().length) { phaseIdx = 0; cycles++; }
      if (totalLeft <= 0) { stop(true); return; }
      startPhase();
    } else {
      $("phase-count").textContent = phaseLeft;
    }
    sessionInfo();
  }

  function sessionInfo() {
    var m = Math.floor(totalLeft / 60), s = totalLeft % 60;
    $("session-info").textContent = cycles + " " + PL.t("cycles") + " · " +
      m + ":" + String(s).padStart(2, "0") + " " + PL.t("remaining");
  }

  function start() {
    running = true;
    phaseIdx = 0;
    cycles = 0;
    totalLeft = parseInt($("duration").value, 10);
    $("btn-toggle").textContent = PL.t("btn.stop");
    $("technique").disabled = true;
    $("duration").disabled = true;
    startPhase();
    sessionInfo();
    timer = setInterval(tick, 1000);
  }

  function stop(done) {
    running = false;
    clearInterval(timer);
    $("btn-toggle").textContent = PL.t("btn.start");
    $("technique").disabled = false;
    $("duration").disabled = false;
    $("phase-label").textContent = done ? PL.t("phase.done") : "";
    $("phase-count").textContent = "";
    $("session-info").textContent = "";
    var c = $("circle");
    c.style.transition = "transform 1.2s ease";
    c.style.transform = "scale(0.72)";
  }

  $("btn-toggle").addEventListener("click", function () {
    if (running) stop(false); else start();
  });
  $("technique").addEventListener("change", updateDesc);

  document.addEventListener("pl:ready", updateDesc);
  PL.onLang(function () {
    updateDesc();
    if (running) {
      var ph = tech()[phaseIdx];
      $("phase-label").textContent = PL.t("phase." + ph.p);
      $("btn-toggle").textContent = PL.t("btn.stop");
      sessionInfo();
    }
  });
})();
</script>
</body>
